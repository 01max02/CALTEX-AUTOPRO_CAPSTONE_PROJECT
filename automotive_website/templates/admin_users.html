<script>
var _editingUserId = null;
var _currentTab = 'all';

function switchTab(tab) {
    _currentTab = tab;
    document.getElementById('tabAll').style.display     = tab === 'all'     ? 'block' : 'none';
    document.getElementById('tabPending').style.display = tab === 'pending' ? 'block' : 'none';
    var allBtn     = document.getElementById('tabAllBtn');
    var pendingBtn = document.getElementById('tabPendingBtn');
    if (tab === 'all') {
        allBtn.style.color = '#E31E24'; allBtn.style.borderBottom = '2px solid #E31E24';
        pendingBtn.style.color = '#718096'; pendingBtn.style.borderBottom = '2px solid transparent';
    } else {
        pendingBtn.style.color = '#E31E24'; pendingBtn.style.borderBottom = '2px solid #E31E24';
        allBtn.style.color = '#718096'; allBtn.style.borderBottom = '2px solid transparent';
    }
}

function _generateTempPassword() {
    var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    var base = '';
    for (var i = 0; i < 8; i++) base += chars[Math.floor(Math.random() * chars.length)];
    return base + '@1';
}

function _sendWelcomeEmail(toEmail, toName, tempPassword, role) {
    return fetch('/api/send-welcome-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to_email: toEmail, to_name: toName, temp_password: tempPassword, role: role })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){ return data.ok === true; })
    .catch(function(err){ console.error('Email send error:', err); return false; });
}

function _sendApprovalEmail(toEmail, toName) {
    return fetch('/api/send-approval-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to_email: toEmail, to_name: toName })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){ return data.ok === true; })
    .catch(function(err){ console.error('Approval email error:', err); return false; });
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Styled confirm dialog ──
function showConfirm(opts) {
    // opts: { title, body, icon, iconBg, okLabel, okColor, onOk }
    var dialog     = document.getElementById('confirmDialog');
    var header     = document.getElementById('confirmHeader');
    var iconWrap   = document.getElementById('confirmIconWrap');
    var titleEl    = document.getElementById('confirmTitle');
    var bodyEl     = document.getElementById('confirmBody');
    var okBtn      = document.getElementById('confirmOkBtn');
    var cancelBtn  = document.getElementById('confirmCancelBtn');

    iconWrap.textContent      = opts.icon   || '❓';
    iconWrap.style.background = opts.iconBg || '#f0f4ff';
    titleEl.textContent       = opts.title  || 'Confirm';
    bodyEl.innerHTML          = opts.body   || '';
    okBtn.textContent         = opts.okLabel || 'OK';
    okBtn.style.background    = opts.okColor || '#E31E24';

    dialog.style.display = 'flex';

    function close() { dialog.style.display = 'none'; okBtn.onclick = null; cancelBtn.onclick = null; }
    okBtn.onclick     = function() { close(); if (opts.onOk) opts.onOk(); };
    cancelBtn.onclick = function() { close(); };
}

// ── Approve user ──
function approveUser(uid, email, name) {
    showConfirm({
        title:   'Approve Account',
        body:    'Approve <strong>' + escHtml(name) + '</strong>?<br/><br/>They will receive an email notification and can sign in immediately.',
        icon:    '✅',
        iconBg:  '#f0fff4',
        okLabel: 'Approve',
        okColor: '#38a169',
        onOk: function() {
            var db = firebase.firestore();
            db.collection('users').doc(uid).update({ status: 'Active' })
                .then(function() {
                    return db.collection('notifications').add({
                        title:      '✅ Account Approved',
                        message:    name + ' (' + email + ') has been approved and can now sign in.',
                        type:       'success',
                        targetRole: 'admin',
                        targetUid:  '',
                        createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
                        readBy:     {},
                        isRead:     false,
                    });
                })
                .then(function() { return _sendApprovalEmail(email, name); })
                .then(function(sent) {
                    showToast(name + ' approved!' + (sent ? ' Email sent.' : ' (Email not sent — check server.)'), 'success');
                })
                .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
        }
    });
}

// ── Reject user (delete from Firestore + Firebase Auth) ──
function rejectUser(uid, name) {
    showConfirm({
        title:   'Reject & Delete Account',
        body:    'Reject <strong>' + escHtml(name) + '</strong>\'s account?<br/><br/>This will <strong>permanently delete</strong> their account.',
        icon:    '🗑️',
        iconBg:  '#fff5f5',
        okLabel: 'Delete Account',
        okColor: '#e53e3e',
        onOk: function() {
            // 1. Delete Firestore document
            firebase.firestore().collection('users').doc(uid).delete()
                .then(function() {
                    // 2. Delete Firebase Auth account via Flask Admin SDK
                    return fetch('/api/delete-user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ uid: uid })
                    })
                    .then(function(r){ return r.json(); })
                    .catch(function(){ return { ok: false }; });
                })
                .then(function(result) {
                    showToast(name + "'s account has been deleted.", 'success');
                })
                .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
        }
    });
}

// ── Toggle active/inactive (non-pending only) ──
function toggleUserStatus(uid, currentStatus) {
    if (currentStatus === 'pending') return;
    var newStatus = currentStatus === 'active' ? 'Inactive' : 'Active';
    var label     = newStatus === 'Inactive' ? 'Deactivate' : 'Activate';
    showConfirm({
        title:   label + ' User',
        body:    'Are you sure you want to <strong>' + label.toLowerCase() + '</strong> this user?',
        icon:    newStatus === 'Inactive' ? '🚫' : '✅',
        iconBg:  newStatus === 'Inactive' ? '#fffbeb' : '#f0fff4',
        okLabel: label,
        okColor: newStatus === 'Inactive' ? '#dd6b20' : '#38a169',
        onOk: function() {
            firebase.firestore().collection('users').doc(uid).update({ status: newStatus })
                .then(function() { showToast('User ' + label.toLowerCase() + 'd successfully.', 'success'); })
                .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
        }
    });
}

// ── Render pending cards ──
function renderPendingCards(pending) {
    var list = document.getElementById('pendingCardsList');
    if (!list) return;
    if (!pending.length) {
        list.innerHTML = '<div style="padding:3rem;text-align:center;color:#718096;">'
            + '<div style="margin-bottom:0.75rem;"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>'
            + '<div style="font-weight:600;">No pending registrations</div></div>';
        return;
    }
    list.innerHTML = pending.map(function(u) {
        var initials = (u.name||'?').split(' ').map(function(n){ return n[0]||''; }).join('').toUpperCase().slice(0,2);
        return '<div style="background:white;border:1px solid #fbd38d;border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:0.85rem;display:flex;align-items:center;gap:1rem;">'
            + '<div style="width:44px;height:44px;border-radius:50%;background:#fff3cd;display:flex;align-items:center;justify-content:center;font-weight:800;color:#c05621;font-size:1rem;flex-shrink:0;">'+initials+'</div>'
            + '<div style="flex:1;min-width:0;">'
            +   '<div style="font-weight:700;color:#1a202c;font-size:0.92rem;">'+escHtml(u.name||'—')+'</div>'
            +   '<div style="color:#718096;font-size:0.8rem;margin-top:0.1rem;">'+escHtml(u.email||'—')+'</div>'
            + '</div>'
            + '<span style="background:#fff3cd;color:#c05621;padding:0.2rem 0.7rem;border-radius:20px;font-size:0.75rem;font-weight:700;flex-shrink:0;">Pending</span>'
            + '<div style="display:flex;gap:0.5rem;flex-shrink:0;">'
            +   '<button onclick="rejectUser(\''+u.id+'\',\''+escHtml(u.name||'')+'\')" style="padding:0.45rem 1rem;background:white;border:1.5px solid #fc8181;border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:700;color:#e53e3e;">Reject</button>'
            +   '<button onclick="approveUser(\''+u.id+'\',\''+escHtml(u.email||'')+'\',\''+escHtml(u.name||'')+'\')" style="padding:0.45rem 1rem;background:#38a169;border:none;border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:700;color:white;">Approve</button>'
            + '</div>'
            + '</div>';
    }).join('');
}

function openAddUserModal() {
    _editingUserId = null;
    document.getElementById('userModalTitle').textContent = 'Add User';
    document.getElementById('userModalIcon').innerHTML = '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>';
    document.getElementById('addUserForm').reset();
    // Reset button to Save state
    var c = document.getElementById('userSubmitContent');
    if (c) c.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save';
    // Show email note for add mode
    var note = document.getElementById('addUserEmailNote');
    if (note) note.style.display = 'flex';
    document.getElementById('addUserModal').classList.add('active');
}

function viewUser(userId) {
    var users = window.users || [];
    var u = users.find(function(x){ return x.id === userId; });
    if (!u) return;
    var roleColors = { admin:'#E31E24', staff:'#003087', customer:'#38a169' };
    var rc = roleColors[(u.role||'').toLowerCase()] || '#718096';
    document.getElementById('vuAvatar').textContent = (u.name||'?').split(' ').map(function(n){ return n[0]; }).join('').toUpperCase().slice(0,2);
    document.getElementById('vuName').textContent = u.name || '—';
    document.getElementById('vuUsername').textContent = '';
    document.getElementById('vuUsername').style.display = 'none';
    var roleLabel = (u.role||''); roleLabel = roleLabel.charAt(0).toUpperCase() + roleLabel.slice(1);
    var statusLower = (u.status||'').toLowerCase();
    var statusColor = statusLower === 'active' ? '#38a169' : '#718096';
    var statusLabel = statusLower === 'active' ? 'Active' : 'Inactive';
    document.getElementById('vuInfoGrid').innerHTML = [
        ['Email', u.email||'—'],
        ['Role', '<span style="background:'+rc+'20;color:'+rc+';padding:0.2rem 0.6rem;border-radius:20px;font-size:0.78rem;font-weight:700;">'+roleLabel+'</span>'],
        ['Status', '<span style="background:'+statusColor+'20;color:'+statusColor+';padding:0.2rem 0.6rem;border-radius:20px;font-size:0.78rem;font-weight:700;">'+statusLabel+'</span>'],
    ].map(function(item){
        return '<div style="background:white;border-radius:10px;padding:0.85rem;border:1px solid #e2e8f0;">'
            + '<div style="font-size:0.7rem;color:#718096;font-weight:700;text-transform:uppercase;margin-bottom:0.3rem;">'+item[0]+'</div>'
            + '<div style="font-weight:600;color:#1a202c;font-size:0.85rem;">'+item[1]+'</div>'
            + '</div>';
    }).join('');
    document.getElementById('vuEditBtn').onclick = function(){ closeModal('viewUserModal'); editUser(userId); };
    document.getElementById('viewUserModal').classList.add('active');
}

function editUser(userId) {
    var users = window.users || [];
    var u = users.find(function(x){ return x.id === userId; });
    if (!u) return;
    _editingUserId = userId;
    document.getElementById('userModalTitle').textContent = 'Edit User';
    document.getElementById('userModalIcon').innerHTML = '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>';
    var form = document.getElementById('addUserForm');
    // Split name into first/last
    var nameParts = (u.name || '').split(' ');
    form.elements.firstName.value = nameParts[0] || '';
    form.elements.lastName.value  = nameParts.slice(1).join(' ') || '';
    form.elements.email.value = u.email || '';
    form.elements.role.value = (u.role||'staff').toLowerCase();
    // Switch button to Update state
    var c = document.getElementById('userSubmitContent');
    if (c) c.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Update';
    // Hide email note in edit mode
    var note = document.getElementById('addUserEmailNote');
    if (note) note.style.display = 'none';
    document.getElementById('addUserModal').classList.add('active');
}

document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('addUserForm');
    if (!form) return;

    function setLoading(on) {
        var btn     = document.getElementById('userSubmitBtn');
        var content = document.getElementById('userSubmitContent');
        var loading = document.getElementById('userSubmitLoading');
        if (!btn) return;
        btn.disabled = on;
        content.style.display = on ? 'none' : 'flex';
        loading.style.display  = on ? 'flex' : 'none';
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var firstName = form.elements.firstName.value.trim();
        var lastName  = form.elements.lastName.value.trim();
        var fullName  = (firstName + ' ' + lastName).trim();
        var email     = form.elements.email.value.trim();
        var role      = form.elements.role.value;
        if (!firstName || !lastName || !email) { showToast('Please fill all required fields.', 'error'); return; }

        setLoading(true);

        var db = firebase.firestore();
        if (_editingUserId) {
            // Edit — update fields, preserve existing status
            db.collection('users').doc(_editingUserId).update({
                firstName: firstName,
                lastName:  lastName,
                name:      fullName,
                email:     email,
                role:      role
            })
                .then(function(){
                    closeModal('addUserModal');
                    showToast('User updated successfully!', 'success');
                })
                .catch(function(err){ showToast('Error: ' + err.message, 'error'); })
                .finally(function(){ setLoading(false); });
        } else {
            // Add — check for existing email first, then auto-generate password, create via Firebase Auth REST, save to Firestore, send email
            var tempPass = _generateTempPassword();
            var apiKey = 'AIzaSyCaoJWbwJk0Xi694ARHpdHhiNjT0SpASRs';

            db.collection('users').where('email', '==', email).limit(1).get()
                .then(function(snap) {
                    if (!snap.empty) {
                        throw new Error('A user with this email already exists in the system.');
                    }
                    return fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + apiKey, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: tempPass, returnSecureToken: false })
                    })
                    .then(function(r){ return r.json(); })
                    .then(function(data) {
                        if (data.error) throw new Error(data.error.message);
                        var uid = data.localId;
                        return db.collection('users').doc(uid).set({
                            firstName: firstName,
                            lastName:  lastName,
                            name:      fullName,
                            email:     email,
                            role:      role,
                            status:    'Active',
                            mustChangePassword: true,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        }).then(function(){ return tempPass; });
                    });
                })
                .then(function(pass) {
                    return _sendWelcomeEmail(email, fullName, pass, role)
                        .then(function(sent) {
                            closeModal('addUserModal');
                            showToast('User added!' + (sent ? ' Credentials sent to ' + email + '.' : ' (Email not sent — check server.)'), 'success');
                        });
                })
                .catch(function(err){
                    showToast('Error: ' + (err.message || 'Unknown error'), 'error');
                })
                .finally(function(){ setLoading(false); });
        }
    });
});
</script>
