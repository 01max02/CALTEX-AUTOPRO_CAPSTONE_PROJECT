<!-- Customer Header Component -->
<header class="cu-topbar">
    <!-- Avatar + Name (clickable → dropdown) -->
    <div class="cu-topbar-brand" style="position:relative;">
        <div class="cu-avatar" id="cuAvatar" onclick="toggleAvatarMenu('cuAvatarMenu')" style="cursor:pointer;">CU</div>
        <span id="cuHeaderName" onclick="toggleAvatarMenu('cuAvatarMenu')" style="color:#fff;font-size:14px;font-weight:700;cursor:pointer;">Customer</span>
        <!-- Avatar dropdown -->
        <div class="avatar-menu" id="cuAvatarMenu" style="display:none;left:0;right:auto;">
            <div class="avatar-menu-user">
                <div class="avatar-menu-name" id="cuAvatarName">Customer</div>
                <div class="avatar-menu-role">Customer</div>
            </div>
            <div class="avatar-menu-divider"></div>
            <a href="profile.html" class="avatar-menu-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                My Profile
            </a>
            <div class="avatar-menu-divider"></div>
            <button class="avatar-menu-item avatar-menu-logout" onclick="cuAvatarLogout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </div>
    </div>
    <div class="cu-topbar-actions">
        <!-- Notification button + dropdown panel -->
        <div class="notif-dropdown-wrap" style="position:relative;display:flex;align-items:center;">
            <button class="cu-notif-btn" id="cuHeaderNotifBtn" onclick="toggleCuNotifPanel()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="cu-notif-badge" id="cuNotifBadge" style="display:none;">0</span>
            </button>
            <div class="notif-panel" id="cuNotifPanel" style="display:none;">
                <div class="notif-panel-header">
                    <span class="notif-panel-title">Notifications</span>
                    <span class="notif-panel-count" id="cuNotifPanelCount">0 notifications</span>
                    <button class="notif-panel-clear" onclick="clearCuNotifications()">Delete all</button>
                </div>
                <div class="notif-panel-list" id="cuNotifList" style="max-height:360px;overflow-y:auto;">
                    <div class="admin-notif-empty">
                        <div class="admin-notif-empty-icon">🔔</div>
                        <div class="admin-notif-empty-text">No notifications</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
