    <style>
        .sr-chat { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:14px; background:#F7F8FA; }
        .sr-bubble-row { display:flex; gap:10px; align-items:flex-end; }
        .sr-bubble-row.user { flex-direction:row-reverse; }
        .sr-avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
        .sr-avatar.ai  { background:linear-gradient(135deg,#003087,#001f5c); color:white; }
        .sr-avatar.usr { background:linear-gradient(135deg,#E8001C,#C41E3A); color:white; font-size:12px; font-weight:700; }
        .sr-bubble { max-width:74%; padding:12px 16px; border-radius:18px; font-size:13px; line-height:1.65; }
        .sr-bubble.ai  { background:white; color:#1a202c; border-radius:4px 18px 18px 18px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
        .sr-bubble.usr { background:linear-gradient(135deg,#E8001C,#C41E3A); color:white; border-radius:18px 4px 18px 18px; box-shadow:0 2px 8px rgba(232,0,28,0.25); }
        .sr-bubble strong { font-weight:700; }
        .sr-bubble .sr-tag { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; margin:2px 2px 2px 0; }
        .sr-bubble table { width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
        .sr-bubble table th { background:#f7f8fa; padding:6px 10px; text-align:left; font-weight:700; color:#4a5568; border-bottom:2px solid #e2e8f0; }
        .sr-bubble table td { padding:6px 10px; border-bottom:1px solid #f0f4f8; color:#1a202c; }
        .sr-bubble table tr:last-child td { border-bottom:none; }
        .sr-bubble table tr:nth-child(even) td { background:#f8fafc; }
        .sr-typing { display:flex; gap:5px; align-items:center; padding:10px 14px; }
        .sr-typing span { width:7px; height:7px; background:#a0aec0; border-radius:50%; animation:srBounce .9s ease-in-out infinite; }
        .sr-typing span:nth-child(2) { animation-delay:.15s; }
        .sr-typing span:nth-child(3) { animation-delay:.3s; }
        @keyframes srBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
        .sr-chips { display:flex; flex-wrap:wrap; gap:7px; padding:12px 24px; background:white; border-top:1px solid #f0f4f8; }
        .sr-chip { padding:6px 13px; background:#f7f8fa; border:1.5px solid #e2e8f0; border-radius:20px; font-size:12px; font-weight:500; color:#4a5568; cursor:pointer; transition:all .15s; white-space:nowrap; }
        .sr-chip:hover { background:#003087; color:white; border-color:#003087; }
        .sr-input-bar { display:flex; gap:10px; align-items:flex-end; padding:12px 20px; background:white; border-top:1px solid #e2e8f0; }
        .sr-input { flex:1; border:1.5px solid #e2e8f0; border-radius:22px; padding:10px 16px; font-size:13px; font-family:inherit; color:#1a202c; background:#F7F8FA; outline:none; resize:none; max-height:100px; overflow-y:auto; transition:border-color .2s; line-height:1.5; }
        .sr-input:focus { border-color:#E8001C; background:white; }
        .sr-send { width:42px; height:42px; background:linear-gradient(135deg,#E8001C,#C41E3A); border:none; border-radius:50%; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 3px 10px rgba(232,0,28,0.3); transition:transform .2s; }
        .sr-send:hover { transform:scale(1.08); }
        .sr-hint { text-align:center; font-size:11px; color:#a0aec0; padding:4px 0 8px; background:white; }
        .sr-welcome-title { font-size:15px; font-weight:700; color:#1a202c; margin-bottom:4px; }
        .sr-welcome-sub { font-size:12px; color:#718096; line-height:1.6; margin-bottom:14px; }
        .sr-welcome-chips { display:flex; flex-wrap:wrap; gap:7px; }
        .sr-welcome-chip { padding:6px 12px; background:#f7f8fa; border:1.5px solid #e2e8f0; border-radius:20px; font-size:12px; font-weight:500; color:#4a5568; cursor:pointer; transition:all .15s; }
        .sr-welcome-chip:hover { background:#003087; color:white; border-color:#003087; }
        .sr-topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:white; border-bottom:1px solid #e2e8f0; flex-shrink:0; }
        .sr-topbar-info { display:flex; align-items:center; gap:10px; }
        .sr-topbar-avatar { width:38px; height:38px; background:linear-gradient(135deg,#003087,#001f5c); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .sr-clear { padding:6px 14px; background:#f7f8fa; border:1.5px solid #e2e8f0; border-radius:8px; font-size:12px; font-weight:600; color:#718096; cursor:pointer; transition:all .15s; }
        .sr-clear:hover { background:#fff5f5; color:#E8001C; border-color:#fed7d7; }
    </style>

<script>
// ════════════════════════════════════════════════════════════
//  Smart Reports AI — Core
// ════════════════════════════════════════════════════════════
var _srAdminInitials = 'AD';
var _srDataReady = false;
var _srExportStore = {};
var _srExportIdx = 0;

// ── Get admin initials from Firestore ──
firebase.auth().onAuthStateChanged(function(user) {
  if (!user) return;
  firebase.firestore().collection('users').doc(user.uid).get().then(function(doc) {
    if (!doc.exists) return;
    var name = doc.data().name || '';
    var parts = name.trim().split(' ').filter(Boolean);
    _srAdminInitials = parts.length >= 2
      ? (parts[0][0] + parts[1][0]).toUpperCase()
      : (parts[0] ? parts[0][0].toUpperCase() : 'AD');
  });
});

// ── Poll until admin_firebase.js has populated global arrays ──
function _srWatchData() {
  var attempts = 0;
  var iv = setInterval(function() {
    attempts++;
    var v = (window.assets || []).length;
    var i = (window.inventory || []).length;
    var s = (window.serviceTransactions || []).length;
    if (v > 0 || i > 0 || s > 0 || attempts >= 12) {
      clearInterval(iv);
      _srDataReady = true;
      var dot = document.getElementById('srStatusDot');
      var txt = document.getElementById('srStatusText');
      if (dot) dot.style.background = '#38a169';
      if (txt) { txt.style.color = '#38a169'; txt.textContent = 'Online · Live Firestore data (' + v + ' vehicles, ' + i + ' items, ' + s + ' services)'; }
    }
  }, 500);
}
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(_srWatchData, 800);
  setTimeout(_srShowWelcome, 900);
});

// ── Helpers ──
function _srEsc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function _srAppend(role, html) {
  var chat = document.getElementById('srChat');
  var row = document.createElement('div');
  row.className = 'sr-bubble-row' + (role === 'user' ? ' user' : '');
  var av = role === 'user'
    ? '<div class="sr-avatar usr">' + _srAdminInitials + '</div>'
    : '<div class="sr-avatar ai">🤖</div>';
  var bub = '<div class="sr-bubble ' + role + '">' + html + '</div>';
  row.innerHTML = role === 'user' ? bub + av : av + bub;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
function _srTyping() {
  var chat = document.getElementById('srChat');
  var row = document.createElement('div');
  row.className = 'sr-bubble-row'; row.id = 'srTyping';
  row.innerHTML = '<div class="sr-avatar ai">🤖</div>'
    + '<div class="sr-bubble ai"><div class="sr-typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
function _srRemoveTyping() { var el = document.getElementById('srTyping'); if (el) el.remove(); }

// ── Send ──
window.srSend = function(preset) {
  var input = document.getElementById('srInput');
  var text = (preset || input.value).trim();
  if (!text) return;
  if (!_srDataReady) {
    _srAppend('ai', '⏳ <strong>Still loading live data…</strong> Please wait a moment and try again.');
    return;
  }
  document.getElementById('srChips').style.display = 'none';
  _srAppend('user', _srEsc(text));
  input.value = ''; input.style.height = 'auto';
  _srTyping();

  var tl = text.toLowerCase();
  var wantPdf   = tl.includes('pdf') || (tl.includes('generate') && tl.includes('report') && !tl.includes('excel') && !tl.includes('xlsx'));
  var wantExcel = tl.includes('excel') || tl.includes('xlsx') || tl.includes('spreadsheet') || tl.includes('csv');
  var wantExport = wantPdf || wantExcel || tl.includes('export') || tl.includes('download');

  var dataQuery = text
    .replace(/generate\s+(a\s+)?report\s*(for|of|about|on)?/gi, '')
    .replace(/export\s+(to\s+)?(pdf|excel|xlsx|csv|spreadsheet)?/gi, '')
    .replace(/download\s+(as\s+)?(pdf|excel|xlsx|csv)?/gi, '')
    .replace(/\b(pdf|excel|xlsx|csv|spreadsheet)\b/gi, '')
    .trim() || text;

  setTimeout(function() {
    _srRemoveTyping();
    var result = _srProcess(dataQuery);
    if (wantExport && result.export && result.export.rows && result.export.rows.length) {
      var eid = 'srexp' + (++_srExportIdx);
      _srExportStore[eid] = result.export;
      if (wantExcel) {
        _srAppend('ai', '✅ <strong>Generating Excel/CSV for "' + _srEsc(result.export.title) + '"…</strong><br>Download will start shortly.');
        setTimeout(function() { srExportExcel(eid); }, 300);
      } else {
        _srAppend('ai', '✅ <strong>Generating PDF for "' + _srEsc(result.export.title) + '"…</strong><br>Print dialog will open shortly.');
        setTimeout(function() { srExportPDF(eid); }, 300);
      }
    } else if (wantExport) {
      _srAppend('ai', '⚠️ <strong>No data to export</strong> for that query. Try asking first (e.g. "PMS overdue vehicles") then say "generate PDF report for PMS overdue vehicles".');
    } else {
      _srAppend('ai', result.html);
    }
  }, 700);
};

window.srClear = function() {
  document.getElementById('srChat').innerHTML = '';
  _srExportStore = {};
  document.getElementById('srChips').style.display = 'flex';
  _srShowWelcome();
};

function _srShowWelcome() {
  var chat = document.getElementById('srChat');
  if (!chat) return;
  var div = document.createElement('div');
  div.className = 'sr-bubble-row';
  div.innerHTML = '<div class="sr-avatar ai">🤖</div>'
    + '<div class="sr-bubble ai" style="max-width:80%;background:white;border-radius:4px 18px 18px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.07);padding:16px 18px;">'
    + '<div class="sr-welcome-title">Hello! I\'m your Smart Reports AI 👋</div>'
    + '<div class="sr-welcome-sub">Ask me anything about your fleet, inventory, maintenance costs, and more. I pull <strong>live data</strong> directly from Firestore.<br>To export, say <strong>"generate PDF report for [topic]"</strong> or <strong>"export Excel for [topic]"</strong>.</div>'
    + '<div class="sr-welcome-chips">'
    + '<button class="sr-welcome-chip" onclick="srSend(\'Show fleet summary\')">📊 Fleet summary</button>'
    + '<button class="sr-welcome-chip" onclick="srSend(\'Which vehicles have PMS overdue?\')">⚠️ PMS overdue</button>'
    + '<button class="sr-welcome-chip" onclick="srSend(\'What items are low in stock?\')">📦 Low stock</button>'
    + '<button class="sr-welcome-chip" onclick="srSend(\'Total repair cost this month\')">💰 Monthly cost</button>'
    + '<button class="sr-welcome-chip" onclick="srSend(\'generate PDF report for all vehicles\')">📄 PDF: All Vehicles</button>'
    + '<button class="sr-welcome-chip" onclick="srSend(\'export Excel for low stock items\')">📊 Excel: Low Stock</button>'
    + '</div></div>';
  chat.appendChild(div);
}
</script>
<script>
// ════════════════════════════════════════════════════════════
//  PDF Export — Professional print layout
// ════════════════════════════════════════════════════════════
window.srExportPDF = function(eid) {
  var d = _srExportStore[eid]; if (!d) return;
  var now = new Date();
  var MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dateStr = MO[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  var timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  var thead = d.headers.map(function(h){return '<th>'+h+'</th>';}).join('');
  var tbody = d.rows.map(function(row,i){
    return '<tr class="'+(i%2===1?'even':'')+'">'
      +row.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';
  }).join('');
  var pd = document.createElement('div'); pd.id='_srPrint';
  pd.innerHTML='<div class="ph"><div class="phi"><div class="phl">'
    +'<img src="../static/img/LOGO_CALTEX.png" class="plogo"><div>'
    +'<div class="pbrand">Caltex <span>Auto</span>Pro</div>'
    +'<div class="pbsub">Fleet Management System</div></div></div>'
    +'<div class="phr"><div class="prlbl">Smart Reports AI — Official Report</div>'
    +'<div class="prtitle">'+d.title+'</div>'
    +'<div class="prmeta">Generated on <strong>'+dateStr+'</strong> at '+timeStr+'</div>'
    +'</div></div>'
    +'<div class="prule"></div>'
    +'<div class="pstrip"><span><strong>JA Noble Enterprise INC</strong></span>'
    +'<span class="psep">|</span><span>caltexautopro2026@gmail.com</span>'
    +'<span class="psep">|</span><span><strong>'+d.rows.length+'</strong> record'+(d.rows.length!==1?'s':'')+'</span></div></div>'
    +'<div class="pc"><div class="ptw"><table><thead><tr>'+thead+'</tr></thead><tbody>'+tbody+'</tbody></table></div></div>';
  var st = document.createElement('style'); st.id='_srPrintSt';
  st.textContent='@media print{body>*:not(#_srPrint){display:none!important}#_srPrint{display:block!important}@page{margin:8mm}}'
    +'*{box-sizing:border-box;margin:0;padding:0}'
    +'#_srPrint{display:none;font-family:"Segoe UI",Arial,sans-serif;font-size:10px;color:#1a202c;background:white;width:100%;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}'
    +'.ph{background:white}.phi{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px}'
    +'.phl{display:flex;align-items:center;gap:12px}.plogo{width:44px;height:44px;object-fit:contain}'
    +'.pbrand{font-size:18px;font-weight:900;color:#1a202c!important;letter-spacing:-0.3px;line-height:1}'
    +'.pbrand span{color:#E8001C!important}.pbsub{font-size:7px;color:#718096!important;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;margin-top:3px}'
    +'.phr{text-align:right}.prlbl{font-size:7px;color:#a0aec0!important;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}'
    +'.prtitle{font-size:16px;font-weight:800;color:#1a202c!important;line-height:1.2}'
    +'.prmeta{font-size:8px;color:#718096!important;margin-top:3px}.prmeta strong{color:#1a202c!important}'
    +'.prule{height:2px;background:#E8001C!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}'
    +'.pstrip{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid #e2e8f0;margin-bottom:14px;font-size:8px;color:#718096!important}'
    +'.pstrip strong{color:#1a202c!important;font-weight:700}.psep{margin:0 10px;color:#cbd5e0!important}'
    +'.pc{padding:0}.ptw{border-radius:6px;overflow:hidden;border:1.5px solid #e2e8f0;width:100%}'
    +'table{width:100%;border-collapse:collapse;font-size:8.5px;table-layout:auto}'
    +'thead tr{background:#1a202c!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}'
    +'thead th{padding:8px 7px;text-align:left;font-size:7px;font-weight:700;color:rgba(255,255,255,0.92)!important;text-transform:uppercase;letter-spacing:0.4px}'
    +'tbody tr{border-bottom:1px solid #f0f4f8}tbody tr.even{background:#f8fafc!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}'
    +'tbody td{padding:5px 7px;vertical-align:middle;color:#2d3748!important;line-height:1.3;font-size:8.5px}';
  document.head.appendChild(st);
  document.body.appendChild(pd);
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      var s=document.getElementById('_srPrintSt'); if(s)s.remove();
      var p=document.getElementById('_srPrint'); if(p)p.remove();
    },500);
  },100);
};

// ════════════════════════════════════════════════════════════
//  Excel / CSV Export
// ════════════════════════════════════════════════════════════
window.srExportExcel = function(eid) {
  var d = _srExportStore[eid]; if (!d) return;
  var now = new Date();
  function esc(v) {
    var tmp=document.createElement('div'); tmp.innerHTML=v;
    return '"'+(tmp.textContent||tmp.innerText||'').replace(/"/g,'""')+'"';
  }
  var lines = [d.headers.map(esc).join(',')];
  d.rows.forEach(function(r){ lines.push(r.map(esc).join(',')); });
  lines.push('');
  lines.push('"Generated by Caltex AutoPro Smart Reports AI","'+now.toLocaleDateString('en-PH')+'"');
  var csv = '\uFEFF' + lines.join('\r\n');
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url;
  a.download=d.title.replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_')
    +'_'+now.getFullYear()+(now.getMonth()+1).toString().padStart(2,'0')+now.getDate().toString().padStart(2,'0')+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
</script>
<script>
// ════════════════════════════════════════════════════════════
//  Query Engine — reads window.assets / inventory / serviceTransactions
//  Field mapping (from admin_firebase.js):
//    assets:   plateNumber, assetDescription, owner, status (lowercase: 'active','overdue','maintenance','due-soon')
//    inventory: itemName, itemNum, commodityGroup, stock, minLevel, price, status ('OK'/'Low')
//    services: plate, assetDescription, mechanicName, dateServiced, status (lowercase), totalCost
//    issuances: itemName, plate, quantity, uom, date, createdBy
//    users:    name, email, role, status
// ════════════════════════════════════════════════════════════
function _srProcess(query) {
  var q = query.toLowerCase().trim();
  var assets    = window.assets || [];
  var inventory = window.inventory || [];
  var services  = window.serviceTransactions || [];
  var issuances = window.issuances || [];
  var users     = window.users || [];

  var MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(d) {
    if (!d) return '—';
    var dt = new Date(d); if (isNaN(dt)) return String(d);
    return MO[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear();
  }
  function fmtP(n) { return '₱'+(parseFloat(n)||0).toLocaleString('en-PH',{minimumFractionDigits:2}); }
  function tag(txt,col,bg) { return '<span class="sr-tag" style="background:'+bg+';color:'+col+';">'+_srEsc(txt)+'</span>'; }

  // Normalize status from admin_firebase.js lowercase codes → display label
  function normStatus(raw) {
    var s = (raw||'').toLowerCase();
    if (s==='overdue'||s.includes('overdue')) return 'Overdue';
    if (s==='maintenance'||s.includes('maintenance')) return 'Under Maintenance';
    if (s==='due-soon'||s.includes('due soon')||s.includes('due-soon')) return 'PMS Due Soon';
    if (s==='active'||s==='on track'||s==='scheduled') return 'Active';
    if (s==='inactive') return 'Inactive';
    // service statuses
    if (s==='pending') return 'Pending';
    if (s==='ongoing') return 'Ongoing';
    if (s==='completed') return 'Completed';
    return raw || '—';
  }
  function statusTag(raw) {
    var label = normStatus(raw);
    var map = {
      'Overdue':['#E8001C','rgba(232,0,28,0.1)'],
      'Under Maintenance':['#d69e2e','rgba(214,158,46,0.1)'],
      'PMS Due Soon':['#d97706','rgba(217,119,6,0.1)'],
      'Active':['#38a169','rgba(56,161,105,0.1)'],
      'Inactive':['#718096','rgba(113,128,150,0.1)'],
      'Pending':['#718096','rgba(113,128,150,0.1)'],
      'Ongoing':['#d69e2e','rgba(214,158,46,0.1)'],
      'Completed':['#003087','rgba(0,48,135,0.1)'],
      'Low':['#E8001C','rgba(232,0,28,0.1)'],
      'OK':['#38a169','rgba(56,161,105,0.1)'],
    };
    var c = map[label]||['#718096','rgba(113,128,150,0.1)'];
    return tag(label,c[0],c[1]);
  }

  function tbl(headers, rows) {
    if (!rows.length) return '<em style="color:#718096;font-size:12px;">No records found.</em>';
    var h = headers.map(function(h){return '<th>'+_srEsc(h)+'</th>';}).join('');
    var r = rows.map(function(row){return '<tr>'+row.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';}).join('');
    return '<table><thead><tr>'+h+'</tr></thead><tbody>'+r+'</tbody></table>';
  }
  function plain(html) { var d=document.createElement('div'); d.innerHTML=html; return d.textContent||d.innerText||''; }
  function mkExp(title,headers,rows) { return {title:title,headers:headers,rows:rows.map(function(r){return r.map(plain);})}; }
  function ret(html,exp) { return {html:html,export:exp||null}; }

  // ── helpers to check vehicle status ──
  function isOverdue(a)  { var s=(a.status||'').toLowerCase(); return s==='overdue'||s.includes('overdue'); }
  function isMaint(a)    { var s=(a.status||'').toLowerCase(); return s==='maintenance'||s.includes('maintenance'); }
  function isDueSoon(a)  { var s=(a.status||'').toLowerCase(); return s==='due-soon'||s.includes('due'); }
  function isActive(a)   { var s=(a.status||'').toLowerCase(); return s==='active'||s==='on track'||s==='scheduled'; }
  function isLowStock(i) { return (parseInt(i.stock)||0) <= (parseInt(i.minLevel)||0); }

  // ── FLEET SUMMARY ──
  if (q.includes('fleet summary')||q.includes('summary')||q.includes('overview')) {
    var tot=assets.length, ov=assets.filter(isOverdue).length, mt=assets.filter(isMaint).length,
        ds=assets.filter(isDueSoon).length, ac=assets.filter(isActive).length,
        ls=inventory.filter(isLowStock).length,
        ps=services.filter(function(s){return (s.status||'').toLowerCase()==='pending';}).length;
    var rows=[['Total Vehicles',String(tot)],['Active / On Track',String(ac)],['Under Maintenance',String(mt)],
      ['PMS Overdue',String(ov)],['PMS Due Soon',String(ds)],['Low Stock Items',String(ls)],
      ['Pending Services',String(ps)],['Total Service Records',String(services.length)]];
    var html='<strong>📊 Fleet &amp; Operations Summary</strong><br><br>'
      +'<strong>Vehicles ('+tot+' total)</strong><br>'
      +'• Active / On Track: <strong>'+ac+'</strong><br>'
      +'• Under Maintenance: <strong>'+mt+'</strong><br>'
      +'• PMS Overdue: <strong>'+ov+'</strong><br>'
      +'• PMS Due Soon: <strong>'+ds+'</strong><br><br>'
      +'<strong>Inventory &amp; Services</strong><br>'
      +'• Low stock items: <strong>'+ls+'</strong><br>'
      +'• Pending services: <strong>'+ps+'</strong><br>'
      +'• Total service records: <strong>'+services.length+'</strong>';
    return ret(html, mkExp('Fleet & Operations Summary',['Metric','Value'],rows));
  }

  // ── ALL VEHICLES ──
  if ((q.includes('all')&&q.includes('vehicle'))||q.includes('show vehicle')||q.includes('list vehicle')||q.includes('show all')) {
    if (!assets.length) return ret('🚗 No vehicles found in the database.');
    var rows=assets.map(function(a){return [_srEsc(a.plateNumber||'—'),_srEsc(a.assetDescription||'—'),_srEsc(a.owner||'—'),statusTag(a.status)];});
    return ret('<strong>🚗 All Vehicles ('+assets.length+')</strong>'+tbl(['Plate','Description','Owner','Status'],rows),
      mkExp('All Vehicles',['Plate','Description','Owner','Status'],rows));
  }

  // ── UNDER MAINTENANCE ──
  if (q.includes('under maintenance')||(q.includes('maintenance')&&!q.includes('cost')&&!q.includes('history')&&!q.includes('record'))) {
    var list=assets.filter(isMaint);
    if (!list.length) return ret('✅ <strong>No vehicles are currently under maintenance.</strong>');
    var rows=list.map(function(a){return [_srEsc(a.plateNumber||'—'),_srEsc(a.assetDescription||'—'),_srEsc(a.owner||'—')];});
    return ret('<strong>🔧 Under Maintenance ('+list.length+')</strong>'+tbl(['Plate','Description','Owner'],rows),
      mkExp('Under Maintenance Vehicles',['Plate','Description','Owner'],rows));
  }

  // ── PMS OVERDUE ──
  if (q.includes('overdue')||(q.includes('pms')&&q.includes('overdue'))) {
    var list=assets.filter(isOverdue);
    if (!list.length) return ret('✅ <strong>No vehicles with overdue PMS.</strong>');
    var rows=list.map(function(a){return [_srEsc(a.plateNumber||'—'),_srEsc(a.assetDescription||'—'),_srEsc(a.owner||'—'),_srEsc(a.nextPMSDue||a.lastServiceDate||'—')];});
    return ret('<strong>⚠️ PMS Overdue ('+list.length+')</strong>'+tbl(['Plate','Description','Owner','Next PMS Due'],rows),
      mkExp('PMS Overdue Vehicles',['Plate','Description','Owner','Next PMS Due'],rows));
  }

  // ── DUE THIS WEEK / DUE SOON ──
  if (q.includes('due this week')||q.includes('due soon')||(q.includes('pms')&&q.includes('due'))) {
    var list=assets.filter(isDueSoon);
    if (!list.length) return ret('✅ <strong>No vehicles with PMS due soon.</strong>');
    var rows=list.map(function(a){return [_srEsc(a.plateNumber||'—'),_srEsc(a.assetDescription||'—'),statusTag(a.status),_srEsc(a.nextPMSDue||'—')];});
    return ret('<strong>📅 PMS Due Soon ('+list.length+')</strong>'+tbl(['Plate','Description','Status','Next PMS Due'],rows),
      mkExp('PMS Due Soon Vehicles',['Plate','Description','Status','Next PMS Due'],rows));
  }

  // ── LOW STOCK ──
  if ((q.includes('low')&&q.includes('stock'))||q.includes('low stock')||q.includes('reorder')) {
    var list=inventory.filter(isLowStock);
    if (!list.length) return ret('✅ <strong>All stock levels are adequate.</strong>');
    var rows=list.map(function(i){
      var out=(parseInt(i.stock)||0)===0;
      return [_srEsc(i.itemName||'—'),_srEsc(i.itemNum||'—'),
        tag(out?'Out of Stock':'Low Stock',out?'#E8001C':'#d69e2e',out?'rgba(232,0,28,0.1)':'rgba(214,158,46,0.1)'),
        String(i.stock||0)+' / '+String(i.minLevel||0)+' '+_srEsc(i.unit||'')];
    });
    return ret('<strong>📦 Low Stock Items ('+list.length+')</strong>'+tbl(['Item','Code','Status','Stock / Min'],rows),
      mkExp('Low Stock Items',['Item','Code','Status','Stock / Min'],rows));
  }

  // ── INVENTORY SUMMARY ──
  if (q.includes('inventory summary')||q.includes('stock summary')||(q.includes('inventory')&&q.includes('summary'))) {
    var tot=inventory.length, ls=inventory.filter(isLowStock).length,
        out=inventory.filter(function(i){return (parseInt(i.stock)||0)===0;}).length,
        ok=tot-ls, val=inventory.reduce(function(s,i){return s+((parseInt(i.stock)||0)*(parseFloat(i.price)||0));},0);
    var rows=[['Total Items',String(tot)],['Adequate Stock',String(ok)],['Low Stock',String(ls)],['Out of Stock',String(out)],['Est. Total Value',fmtP(val)]];
    var html='<strong>🗃️ Inventory Summary</strong><br><br>'
      +'• Total items: <strong>'+tot+'</strong><br>'
      +'• Adequate stock: <strong>'+ok+'</strong><br>'
      +'• Low stock: <strong>'+ls+'</strong><br>'
      +'• Out of stock: <strong>'+out+'</strong><br>'
      +'• Estimated total value: <strong>'+fmtP(val)+'</strong>';
    return ret(html, mkExp('Inventory Summary',['Metric','Value'],rows));
  }

  // ── ALL INVENTORY ──
  if ((q.includes('all')&&q.includes('inventor'))||q.includes('show inventory')||q.includes('list inventory')) {
    if (!inventory.length) return ret('No inventory items found.');
    var rows=inventory.map(function(i){return [_srEsc(i.itemName||'—'),_srEsc(i.itemNum||'—'),_srEsc(i.commodityGroup||'—'),String(i.stock||0),String(i.minLevel||0),fmtP(i.price||0)];});
    return ret('<strong>🗃️ All Inventory Items ('+inventory.length+')</strong>'+tbl(['Item','Code','Group','Stock','Min','Price'],rows),
      mkExp('All Inventory Items',['Item','Code','Group','Stock','Min','Price'],rows));
  }

  // ── REPAIR / MAINTENANCE COST ──
  if (q.includes('cost')||q.includes('repair cost')||q.includes('total cost')||q.includes('expense')) {
    var now=new Date();
    var thisMonth=services.filter(function(s){
      var d=s.dateServiced||s.date||''; if(!d)return false;
      var dt=new Date(d); return !isNaN(dt)&&dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();
    });
    var mCost=thisMonth.reduce(function(s,t){return s+(parseFloat(t.totalCost||t.cost||0)||0);},0);
    var aCost=services.reduce(function(s,t){return s+(parseFloat(t.totalCost||t.cost||0)||0);},0);
    var rows=[['This Month ('+MO[now.getMonth()]+' '+now.getFullYear()+')',fmtP(mCost),String(thisMonth.length)],
      ['All Time',fmtP(aCost),String(services.length)]];
    var html='<strong>💰 Maintenance Cost Report</strong><br><br>'
      +'• This month ('+MO[now.getMonth()]+' '+now.getFullYear()+'): <strong>'+fmtP(mCost)+'</strong> ('+thisMonth.length+' service'+(thisMonth.length!==1?'s':'')+')<br>'
      +'• All time total: <strong>'+fmtP(aCost)+'</strong> across <strong>'+services.length+'</strong> service records';
    return ret(html, mkExp('Maintenance Cost Report',['Period','Total Cost','Services'],rows));
  }

  // ── PENDING SERVICES ──
  if (q.includes('pending')&&(q.includes('service')||q.includes('services'))) {
    var list=services.filter(function(s){return (s.status||'').toLowerCase()==='pending';});
    if (!list.length) return ret('✅ <strong>No pending services.</strong>');
    var rows=list.map(function(s){return [_srEsc(s.plate||s.assetNum||'—'),_srEsc(s.assetDescription||'—'),_srEsc(s.mechanicName||s.mechanic||'—'),_srEsc(s.dateServiced||s.date||'—')];});
    return ret('<strong>⏳ Pending Services ('+list.length+')</strong>'+tbl(['Plate','Description','Mechanic','Date'],rows),
      mkExp('Pending Services',['Plate','Description','Mechanic','Date'],rows));
  }

  // ── ONGOING SERVICES ──
  if (q.includes('ongoing')&&(q.includes('service')||q.includes('services'))) {
    var list=services.filter(function(s){return (s.status||'').toLowerCase()==='ongoing';});
    if (!list.length) return ret('✅ <strong>No ongoing services.</strong>');
    var rows=list.map(function(s){return [_srEsc(s.plate||s.assetNum||'—'),_srEsc(s.assetDescription||'—'),_srEsc(s.mechanicName||s.mechanic||'—'),_srEsc(s.dateServiced||s.date||'—')];});
    return ret('<strong>🔄 Ongoing Services ('+list.length+')</strong>'+tbl(['Plate','Description','Mechanic','Date'],rows),
      mkExp('Ongoing Services',['Plate','Description','Mechanic','Date'],rows));
  }

  // ── COMPLETED SERVICES ──
  if (q.includes('completed')&&(q.includes('service')||q.includes('services'))) {
    var list=services.filter(function(s){return (s.status||'').toLowerCase()==='completed';});
    if (!list.length) return ret('No completed services found.');
    var rows=list.slice(0,25).map(function(s){return [_srEsc(s.plate||s.assetNum||'—'),_srEsc(s.assetDescription||'—'),_srEsc(s.mechanicName||s.mechanic||'—'),fmtP(s.totalCost||s.cost||0)];});
    return ret('<strong>✅ Completed Services ('+list.length+')</strong> — showing latest 25'+tbl(['Plate','Description','Mechanic','Cost'],rows),
      mkExp('Completed Services',['Plate','Description','Mechanic','Cost'],rows));
  }

  // ── ALL SERVICES ──
  if ((q.includes('all')&&q.includes('service'))||q.includes('show services')||q.includes('list services')) {
    if (!services.length) return ret('No service records found.');
    var rows=services.slice(0,30).map(function(s){return [_srEsc(s.plate||s.assetNum||'—'),_srEsc(s.assetDescription||'—'),_srEsc(s.mechanicName||s.mechanic||'—'),_srEsc(s.dateServiced||s.date||'—'),statusTag(s.status),fmtP(s.totalCost||s.cost||0)];});
    return ret('<strong>🔧 All Services ('+services.length+')</strong> — showing latest 30'+tbl(['Plate','Description','Mechanic','Date','Status','Cost'],rows),
      mkExp('All Services',['Plate','Description','Mechanic','Date','Status','Cost'],rows));
  }

  // ── FREQUENTLY MAINTAINED ──
  if (q.includes('frequent')||(q.includes('most')&&q.includes('maintain'))) {
    var counts={};
    services.forEach(function(s){var p=s.plate||s.assetNum||'';if(p)counts[p]=(counts[p]||0)+1;});
    var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,10);
    if (!sorted.length) return ret('No service records found.');
    var rows=sorted.map(function(p){var a=assets.find(function(x){return (x.plateNumber||'')===p;});return [_srEsc(p),_srEsc(a?a.assetDescription||'—':'—'),String(counts[p])];});
    return ret('<strong>🔧 Most Frequently Maintained Vehicles</strong>'+tbl(['Plate','Description','Service Count'],rows),
      mkExp('Frequently Maintained Vehicles',['Plate','Description','Service Count'],rows));
  }

  // ── FAST MOVING INVENTORY ──
  if (q.includes('fast')||(q.includes('most')&&q.includes('used'))||q.includes('fast moving')) {
    var counts={};
    issuances.forEach(function(i){var n=i.itemName||i.item||'';if(n)counts[n]=(counts[n]||0)+(parseFloat(i.quantity||i.qty)||0);});
    var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,10);
    if (!sorted.length) return ret('No issuance data found. Items are tracked when issued to vehicles.');
    var rows=sorted.map(function(k){return [_srEsc(k),String(counts[k])+' units'];});
    return ret('<strong>📈 Fast Moving Inventory Items</strong>'+tbl(['Item','Total Issued'],rows),
      mkExp('Fast Moving Inventory Items',['Item','Total Issued'],rows));
  }

  // ── ISSUANCES ──
  if (q.includes('issuance')||q.includes('issued')) {
    if (!issuances.length) return ret('No issuance records found.');
    var rows=issuances.slice(0,20).map(function(i){return [_srEsc(i.itemName||'—'),_srEsc(i.plate||'—'),String(i.quantity||0),_srEsc(i.uom||'—'),_srEsc(i.date||'—'),_srEsc(i.createdBy||'—')];});
    return ret('<strong>📋 Issuances ('+issuances.length+')</strong> — showing latest 20'+tbl(['Item','Plate','Qty','UOM','Date','By'],rows),
      mkExp('Issuances',['Item','Plate','Qty','UOM','Date','By'],rows));
  }

  // ── USERS / STAFF ──
  if (q.includes('user')||q.includes('staff')||q.includes('customer')||q.includes('how many user')) {
    var adm=users.filter(function(u){return u.role==='admin';}).length,
        stf=users.filter(function(u){return u.role==='staff';}).length,
        cus=users.filter(function(u){return u.role==='customer';}).length;
    var rows=[['Admins',String(adm)],['Staff',String(stf)],['Customers',String(cus)],['Total',String(users.length)]];
    var html='<strong>👥 User Summary</strong><br><br>'
      +'• Total users: <strong>'+users.length+'</strong><br>'
      +'• Admins: <strong>'+adm+'</strong><br>'
      +'• Staff: <strong>'+stf+'</strong><br>'
      +'• Customers: <strong>'+cus+'</strong>';
    return ret(html, mkExp('User Summary',['Role','Count'],rows));
  }

  // ── FALLBACK ──
  return ret('<strong>🤔 I couldn\'t find a match for "'+_srEsc(query)+'".</strong><br><br>'
    +'Try asking about:<br>'
    +'• <em>Fleet summary, all vehicles, under maintenance</em><br>'
    +'• <em>PMS overdue, due this week, due soon</em><br>'
    +'• <em>Low stock, inventory summary, all inventory, fast moving items</em><br>'
    +'• <em>Repair cost, pending / ongoing / completed / all services</em><br>'
    +'• <em>Frequently maintained vehicles, issuances, user summary</em><br><br>'
    +'To export: say <strong>"generate PDF report for [topic]"</strong> or <strong>"export Excel for [topic]"</strong>.');
}
</script>
</body>
</html>
