<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Bookings</title>
    <link rel="icon" type="image/png" href="../static/img/LOGO_CALTEX.png" />
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
</head>
<body class="portal-body" data-page="pms-reschedule">

<div class="admin-dashboard" style="display:flex;flex-direction:column;">
    <div id="headerContainer"></div>
    <div class="admin-dashboard-body">
    <div id="sidebarContainer"></div>

    <div class="admin-main">
        <div class="admin-header">
            <div>
                <div class="breadcrumb">Admin Portal › Vehicle Maintenance Management</div>
                <div class="admin-header-title">Service Bookings</div>
            </div>
            <div style="margin-left:auto;display:flex;align-items:center;gap:0.75rem;">
            </div>
        </div>

        <div class="admin-content">
            <!-- Stat chips -->
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(214,158,46,0.1);color:#d69e2e;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div class="stat-number" id="statPending" style="color:#d69e2e;">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="stat-number" id="statApproved">0</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(113,128,150,0.1);color:#718096;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </div>
                    <div class="stat-number" id="statDismissed" style="color:#718096;">0</div>
                    <div class="stat-label">Dismissed</div>
                </div>
            </div>

            <!-- Tabs -->
            <div style="display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:1.25rem;">
                <button class="sb-tab active" data-filter="Pending" onclick="sbSwitchTab(this,'Pending')" style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.88rem;font-weight:700;color:#d69e2e;border-bottom:2px solid #d69e2e;margin-bottom:-2px;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;">
                    Pending <span id="tabBadgePending" style="background:#d69e2e;color:white;font-size:0.7rem;font-weight:800;padding:1px 7px;border-radius:10px;">0</span>
                </button>
                <button class="sb-tab" data-filter="Approved" onclick="sbSwitchTab(this,'Approved')" style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.88rem;font-weight:700;color:#718096;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;">
                    Approved
                </button>
                <button class="sb-tab" data-filter="Dismissed" onclick="sbSwitchTab(this,'Dismissed')" style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.88rem;font-weight:700;color:#718096;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;">
                    Dismissed
                </button>
                <button class="sb-tab" data-filter="all" onclick="sbSwitchTab(this,'all')" style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.88rem;font-weight:700;color:#718096;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;">
                    All
                </button>
            </div>

            <!-- Table -->
            <div class="data-table">
                <div class="table-row" style="background:#f7fafc;font-weight:bold;border-bottom:2px solid #e2e8f0;grid-template-columns:1fr 1.5fr 1.5fr 1fr 1fr 1fr 140px;">
                    <div>Plate</div>
                    <div>Customer</div>
                    <div>Services</div>
                    <div>Preferred Date</div>
                    <div>Requested</div>
                    <div>Status</div>
                    <div>Actions</div>
                </div>
                <div id="rescheduleTableBody">
                    <div style="padding:3rem;text-align:center;color:#718096;font-size:13px;">Loading...</div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>

<div id="toast"></div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyCaoJWbwJk0Xi694ARHpdHhiNjT0SpASRs",
      authDomain: "caltex-autopro-1e664.firebaseapp.com",
      projectId: "caltex-autopro-1e664",
      storageBucket: "caltex-autopro-1e664.firebasestorage.app",
      messagingSenderId: "930140433367",
      appId: "1:930140433367:web:cf67bfa388fa517422b992"
    });
  }
</script>
<script src="../static/js/admin_firebase.js"></script>
<script src="../static/js/admin_functions.js"></script>
<script src="../static/js/admin.js"></script>
<script src="../static/js/admin_sidebar.js"></script>
<script>
(function () {
  var db = firebase.firestore();
  var _allDocs = [];

  function _timeAgo(ts) {
    if (!ts || !ts.toMillis) return '—';
    var diff = Date.now() - ts.toMillis();
    var mins = Math.floor(diff / 60000);
    if (mins < 1)  return 'Just now';
    if (mins < 60) return mins + ' min ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24)  return hrs + ' hr ago';
    var days = Math.floor(hrs / 24);
    return days === 1 ? 'Yesterday' : days + ' days ago';
  }

  var _MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function _formatDate(dateStr) {
    if (!dateStr) return '—';
    var parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    var y = parseInt(parts[0]);
    var m = parseInt(parts[1]) - 1;
    var d = parseInt(parts[2]);
    if (isNaN(y) || isNaN(m) || isNaN(d)) return dateStr;
    return _MONTHS[m] + ' ' + d + ', ' + y;
  }

  var _currentFilter = 'Pending';

  window.sbSwitchTab = function(btn, filter) {
    _currentFilter = filter;
    document.querySelectorAll('.sb-tab').forEach(function(t) {
      t.style.color = '#718096';
      t.style.borderBottom = '2px solid transparent';
      t.classList.remove('active');
    });
    var colors = { 'Pending':'#d69e2e', 'Approved':'#38a169', 'Dismissed':'#718096', 'all':'#003087' };
    btn.style.color = colors[filter] || '#003087';
    btn.style.borderBottom = '2px solid ' + (colors[filter] || '#003087');
    btn.classList.add('active');
    renderRescheduleList();
  };

  window.renderRescheduleList = function () {
    var filter = _currentFilter;
    var body = document.getElementById('rescheduleTableBody');
    if (!body) return;

    var docs = filter === 'all'
      ? _allDocs
      : _allDocs.filter(function(d) { return d.status === filter; });

    if (docs.length === 0) {
      body.innerHTML = '<div style="padding:3rem;text-align:center;color:#718096;font-size:13px;">No bookings found.</div>';
      return;
    }

    body.innerHTML = docs.map(function(r) {
      var isPending  = r.status === 'Pending';
      var isApproved = r.status === 'Approved';
      var sc = isPending ? '#d69e2e' : isApproved ? '#38a169' : '#718096';
      var sb = isPending ? 'rgba(214,158,46,0.1)' : isApproved ? 'rgba(56,161,105,0.1)' : 'rgba(113,128,150,0.1)';
      var svcList = (r.services || []).join(', ') || '—';
      return '<div class="table-row" style="grid-template-columns:1fr 1.5fr 1.5fr 1fr 1fr 1fr 140px;align-items:center;">'
        + '<div style="font-weight:700;color:#1a202c;">' + (r.plate || '—') + '</div>'
        + '<div style="color:#4a5568;font-size:13px;">' + (r.customerName || '—') + '</div>'
        + '<div style="color:#718096;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + svcList + '">' + svcList + '</div>'
        + '<div style="font-weight:600;color:#003087;">' + _formatDate(r.preferredDate) + '</div>'
        + '<div style="color:#718096;font-size:12px;">' + _timeAgo(r.createdAt) + '</div>'
        + '<div><span style="background:' + sb + ';color:' + sc + ';font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;">' + (r.status || 'Pending') + '</span></div>'
        + '<div style="display:flex;gap:6px;">'
        + (isPending
          ? '<button onclick="approveBooking(\'' + r.id + '\',\'' + (r.plate||'') + '\')" style="padding:5px 12px;background:#38a169;border:none;border-radius:7px;color:white;font-size:12px;font-weight:600;cursor:pointer;">Approve</button>'
            + '<button onclick="dismissBooking(\'' + r.id + '\')" style="padding:5px 12px;background:#e53e3e;border:none;border-radius:7px;color:white;font-size:12px;font-weight:600;cursor:pointer;">Dismiss</button>'
          : '<span style="font-size:12px;color:#a0aec0;">—</span>')
        + '</div>'
        + '</div>';
    }).join('');
  };

  window.approveBooking = function(docId, plate) {
    if (!confirm('Approve service booking for ' + plate + '?')) return;
    db.collection('service_bookings').doc(docId).update({ status: 'Approved' })
      .then(function() { showToast('Booking approved for ' + plate, 'success'); })
      .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
  };

  window.dismissBooking = function(docId) {
    if (!confirm('Dismiss this booking?')) return;
    db.collection('service_bookings').doc(docId).update({ status: 'Dismissed' })
      .then(function() { showToast('Booking dismissed.', 'success'); })
      .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
  };

  function _updateStats() {
    var s = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };
    var pending = _allDocs.filter(function(r) { return r.status === 'Pending'; }).length;
    s('statPending', pending);
    s('statApproved',  _allDocs.filter(function(r) { return r.status === 'Approved'; }).length);
    s('statDismissed', _allDocs.filter(function(r) { return r.status === 'Dismissed'; }).length);
    // Update tab badge
    var badge = document.getElementById('tabBadgePending');
    if (badge) { badge.textContent = pending; badge.style.display = pending > 0 ? 'inline-block' : 'none'; }
  }

  // Real-time listener on service_bookings
  db.collection('service_bookings')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function(snap) {
      _allDocs = snap.docs.map(function(d) {
        var data = d.data();
        data.id = d.id;
        data.createdAt = data.createdAt || null;
        return data;
      });
      _updateStats();
      renderRescheduleList();
    }, function() {
      db.collection('service_bookings').get().then(function(snap) {
        _allDocs = snap.docs.map(function(d) {
          var data = d.data();
          data.id = d.id;
          return data;
        });
        _updateStats();
        renderRescheduleList();
      });
    });
})();
</script>
</body>
</html>
