<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
  <link rel="icon" type="image/png" href="../static/img/LOGO_CALTEX.png" />
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
    <link rel="stylesheet" href="../static/css/change_password.css">
</head>
<body class="portal-body" data-page="change_password">

<!-- ── Admin layout ── -->
<div id="adminWrap" style="display:none;flex-direction:column;" class="admin-dashboard">
    <div id="headerContainer"></div>
    <div class="admin-dashboard-body">
        <div id="sidebarContainer"></div>
        <div class="admin-main">
            <div class="admin-header">
                <div>
                    <div class="breadcrumb">Admin Portal › My Profile › Change Password</div>
                    <div class="admin-header-title">Change Password</div>
                </div>
            </div>
            <div class="admin-content">
                <div id="cpContent"></div>
            </div>
        </div>
    </div>
</div>

<!-- ── Customer / Staff layout ── -->
<div id="standaloneWrap" style="display:none;flex-direction:column;min-height:100vh;">
    <div id="cuHeaderWrap"></div>
    <main style="flex:1;overflow-y:auto;padding:1.5rem 2rem;background:#F7F8FA;">
        <div id="cpContent2"></div>
    </main>
</div>

<div id="cpToast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyCaoJWbwJk0Xi694ARHpdHhiNjT0SpASRs",
      authDomain: "caltex-autopro-1e664.firebaseapp.com",
      projectId: "caltex-autopro-1e664",
      storageBucket: "caltex-autopro-1e664.firebasestorage.app",

      appId: "1:930140433367:web:cf67bfa388fa517422b992"
    });
  }
</script>
<script>
(function() {
    var _role = sessionStorage.getItem('apUser') ? 'admin'
              : sessionStorage.getItem('spUser') ? 'staff'
              : sessionStorage.getItem('cpUser') ? 'customer' : null;
    if (!_role) { window.location.href = 'login.html'; return; }
    window._cpRole = _role;
    if (_role === 'admin') {
        var scripts = ['../static/js/admin_sidebar.js','../static/js/admin_firebase.js','../static/js/admin_functions.js','../static/js/admin.js','../static/js/customer_shared.js'];
        (function loadNext(i) {
            if (i >= scripts.length) return;
            var s = document.createElement('script'); s.src = scripts[i];
            s.onload = function() { loadNext(i + 1); }; document.body.appendChild(s);
        })(0);
    } else {
        var s = document.createElement('script'); s.src = '../static/js/customer_shared.js'; document.body.appendChild(s);
    }
})();
</script>
<script>
var _cpRole = window._cpRole || 'customer';

(function () {
    if (_cpRole === 'admin') {
        document.getElementById('adminWrap').style.display = 'flex';
    } else {
        document.getElementById('standaloneWrap').style.display = 'flex';
        fetch('customer_header.html').then(function (r) { return r.text(); }).then(function (html) {
            document.getElementById('cuHeaderWrap').innerHTML = html;
            if (typeof setActiveTab === 'function') setActiveTab();
            var sessKey = _cpRole === 'staff' ? 'spUser' : 'cpUser';
            var sess = JSON.parse(sessionStorage.getItem(sessKey) || '{}');
            if (sess.name) {
                var parts = sess.name.trim().split(' ').filter(Boolean);
                var ini = parts.length >= 2 ? (parts[0][0] + parts[1][0]).toUpperCase() : parts[0][0].toUpperCase();
                var av = document.getElementById('cuAvatar'); if (av) av.textContent = ini;
                var nm = document.getElementById('cuAvatarName'); if (nm) nm.textContent = sess.name;
            }
        });
    }
    var html = _buildHTML();
    var target = _cpRole === 'admin' ? document.getElementById('cpContent') : document.getElementById('cpContent2');
    if (target) target.innerHTML = html;

    // Show first-login banner if mustChangePassword flag is set
    firebase.auth().onAuthStateChanged(function(user) {
        if (!user) return;
        firebase.firestore().collection('users').doc(user.uid).get().then(function(doc) {
            if (doc.exists && doc.data().mustChangePassword === true) {
                var banner = document.createElement('div');
                banner.style.cssText = 'background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;font-size:13px;color:#856404;';
                banner.innerHTML = '<span style="font-size:18px;">🔐</span><span><strong>Action required:</strong> Please set a new password before continuing. This is required for your first login.</span>';
                var target2 = _cpRole === 'admin' ? document.getElementById('cpContent') : document.getElementById('cpContent2');
                if (target2) target2.insertBefore(banner, target2.firstChild);
            }
        }).catch(function() {});
    });
})();

firebase.auth().onAuthStateChanged(function (user) {
    if (!user) window.location.href = 'login.html';
});

function _buildHTML() {
    return '<a class="cp-back" href="profile.html">'
        +   '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>'
        +   'Back to Profile'
        + '</a>'
        + '<div class="cp-page-grid">'

        // ── Left: info card ──
        + '<div class="cp-info-card">'
        +   '<div class="cp-info-banner">'
        +     '<div class="cp-info-banner-icon">'
        +       '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
        +     '</div>'
        +     '<div class="cp-info-banner-title">Change Password</div>'
        +     '<div class="cp-info-banner-sub">Keep your account secure with a strong password</div>'
        +   '</div>'
        +   '<div class="cp-info-tips">'
        +     '<div class="cp-tip-row"><div class="cp-tip-dot">1</div><span>Use at least <strong>6 characters</strong></span></div>'
        +     '<div class="cp-tip-row"><div class="cp-tip-dot">2</div><span>Mix <strong>uppercase &amp; lowercase</strong> letters</span></div>'
        +     '<div class="cp-tip-row"><div class="cp-tip-dot">3</div><span>Include <strong>numbers</strong> and <strong>symbols</strong></span></div>'
        +     '<div class="cp-tip-row"><div class="cp-tip-dot">4</div><span>Avoid using your <strong>name or email</strong></span></div>'
        +   '</div>'
        + '</div>'

        // ── Right: form card ──
        + '<div class="cp-card">'
        +   '<div class="cp-card-head">'
        +     '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8001C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
        +     '<span class="cp-card-head-title">Set New Password</span>'
        +   '</div>'
        +   '<div class="cp-body">'
        +     '<div class="cp-group">'
        +       '<label class="cp-label">Current Password</label>'
        +       '<div class="cp-input-wrap">'
        +         '<input class="cp-input" type="password" id="cpCurrPass" placeholder="Enter current password">'
        +         '<button class="cp-eye" type="button" onclick="toggleEye(\'cpCurrPass\',this)" aria-label="Toggle visibility">'
        +           '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        +         '</button>'
        +       '</div>'
        +     '</div>'
        +     '<div class="cp-divider"></div>'
        +     '<div class="cp-row-2">'
        +       '<div class="cp-group">'
        +         '<label class="cp-label">New Password</label>'
        +         '<div class="cp-input-wrap">'
        +           '<input class="cp-input" type="password" id="cpNewPass" placeholder="Enter new password" oninput="checkStrength()">'
        +           '<button class="cp-eye" type="button" onclick="toggleEye(\'cpNewPass\',this)" aria-label="Toggle visibility">'
        +             '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        +           '</button>'
        +         '</div>'
        +         '<div class="cp-strength">'
        +           '<div class="cp-strength-bar" id="cpStrBar"><div class="cp-strength-fill" id="cpStrFill"></div></div>'
        +           '<span class="cp-strength-label" id="cpStrLabel" style="color:#a0aec0;"></span>'
        +         '</div>'
        +       '</div>'
        +       '<div class="cp-group">'
        +         '<label class="cp-label">Confirm Password</label>'
        +         '<div class="cp-input-wrap">'
        +           '<input class="cp-input" type="password" id="cpConfPass" placeholder="Confirm new password">'
        +           '<button class="cp-eye" type="button" onclick="toggleEye(\'cpConfPass\',this)" aria-label="Toggle visibility">'
        +             '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        +           '</button>'
        +         '</div>'
        +         '<div class="cp-hint">Must be at least 6 characters.</div>'
        +       '</div>'
        +     '</div>'
        +     '<div class="cp-divider"></div>'
        +     '<div class="cp-btn-row">'
        +       '<button class="cp-btn" id="cpSaveBtn" onclick="doChangePassword()">'
        +         '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
        +         'Update Password'
        +       '</button>'
        +     '</div>'
        +   '</div>'
        + '</div>'

        + '</div>'; // .cp-page-grid
}

window.toggleEye = function (inputId, btn) {
    var inp = document.getElementById(inputId);
    if (!inp) return;
    var show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    // show=true means we're revealing → switch to open eye (no slash)
    // show=false means we're hiding → switch back to slashed eye
    btn.innerHTML = show
        ? '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
};

window.checkStrength = function () {
    var val  = (document.getElementById('cpNewPass')?.value || '');
    var fill = document.getElementById('cpStrFill');
    var lbl  = document.getElementById('cpStrLabel');
    var bar  = document.getElementById('cpStrBar');
    if (!fill || !lbl) return;
    if (bar) bar.classList.toggle('visible', val.length > 0);
    var score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/\d/.test(val))   score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    var levels = [
        { w: '0%',   c: '#e2e8f0', t: '' },
        { w: '25%',  c: '#E8001C', t: 'Weak' },
        { w: '50%',  c: '#ed8936', t: 'Fair' },
        { w: '75%',  c: '#ecc94b', t: 'Good' },
        { w: '100%', c: '#38a169', t: 'Strong' },
    ];
    var lvl = val.length === 0 ? levels[0] : levels[Math.min(score, 4)];
    fill.style.width      = lvl.w;
    fill.style.background = lvl.c;
    lbl.textContent       = lvl.t;
    lbl.style.color       = lvl.c;
};

window.doChangePassword = function () {
    var curr    = (document.getElementById('cpCurrPass')?.value    || '').trim();
    var pass    = (document.getElementById('cpNewPass')?.value     || '').trim();
    var confirm = (document.getElementById('cpConfPass')?.value    || '').trim();
    if (!curr)            { _showCpToast('Please enter your current password.', 'error'); return; }
    if (!pass)            { _showCpToast('Please enter a new password.', 'error'); return; }
    if (pass.length < 6)  { _showCpToast('Password must be at least 6 characters.', 'error'); return; }
    if (pass !== confirm) { _showCpToast('Passwords do not match.', 'error'); return; }

    var btn = document.getElementById('cpSaveBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Updating…'; }

    var user = firebase.auth().currentUser;
    var credential = firebase.auth.EmailAuthProvider.credential(user.email, curr);

    user.reauthenticateWithCredential(credential)
        .then(function () {
            return user.updatePassword(pass);
        })
        .then(function () {
            // Clear the mustChangePassword flag in Firestore
            return firebase.firestore().collection('users').doc(user.uid)
                .update({ mustChangePassword: false })
                .catch(function () { /* ignore if field doesn't exist */ });
        })
        .then(function () {
            _showCpToast('Password updated successfully!', 'success');
            document.getElementById('cpCurrPass').value  = '';
            document.getElementById('cpNewPass').value   = '';
            document.getElementById('cpConfPass').value  = '';
            checkStrength();
            // Redirect to dashboard after first-login password change
            setTimeout(function () {
                var role = window._cpRole || 'customer';
                var dashMap = { admin: 'admin_dashboard.html', staff: 'staff_dashboard.html', customer: 'customer_dashboard.html' };
                window.location.href = dashMap[role] || 'customer_dashboard.html';
            }, 1500);
        })
        .catch(function (err) {
            var msg = err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential'
                ? 'Current password is incorrect.'
                : 'Error: ' + err.message;
            _showCpToast(msg, 'error');
        })
        .finally(function () {
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Update Password';
            }
        });
};

function _showCpToast(msg, type) {
    var t = document.getElementById('cpToast');
    if (!t) return;
    t.textContent = msg;
    t.className = 'toast-visible toast-' + (type || 'success');
    clearTimeout(window._cpToastTimer);
    window._cpToastTimer = setTimeout(function () { t.className = ''; }, 3000);
}
</script>
</body>
