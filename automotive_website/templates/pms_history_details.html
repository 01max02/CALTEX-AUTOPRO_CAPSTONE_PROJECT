<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS History Details</title>
    <link rel="icon" type="image/png" href="../static/img/LOGO_CALTEX.png" />
    <link rel="stylesheet" href="../static/css/customer_dashboard.css">
    <style>
        
        /* Layout */
        .phd-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 32px;
        }
        
        /* Left sidebar - vehicle info */
        .phd-sidebar {
            position: sticky;
            top: 24px;
            align-self: start;
        }
        .phd-vehicle-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1.5px solid #e2e8f0;
        }
        .phd-vehicle-plate {
            font-size: 20px;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 4px;
        }
        .phd-vehicle-desc {
            font-size: 13px;
            color: #718096;
            margin-bottom: 16px;
        }
        .phd-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .phd-stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #f7f8fa;
            border-radius: 12px;
            border: 1px solid #f0f4f8;
        }
        .phd-stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .phd-stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
        }
        .phd-stat-label {
            font-size: 11px;
            color: #718096;
        }
        .phd-back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            padding: 10px 16px;
            background: #f7f8fa;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            text-decoration: none;
            transition: all .15s;
            width: 100%;
            justify-content: center;
        }
        .phd-back-btn:hover {
            background: #E8001C;
            border-color: #E8001C;
            color: white;
        }
        
        /* Right content - records */
        .phd-records {
            min-width: 0;
        }
        .phd-records-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .phd-records-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
        }
        .phd-records-count {
            font-size: 12px;
            color: #718096;
            background: #f7f8fa;
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* Record card */
        .phd-record-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid #f0f4f8;
            transition: box-shadow .15s, transform .15s;
        }
        .phd-record-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }
        .phd-record-header {
            background: #f7f8fa;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f4f8;
        }
        .phd-record-date {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #1a202c;
        }
        .phd-record-status {
            background: #f0fdf4;
            color: #16a34a;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .phd-record-body {
            padding: 14px;
        }
        .phd-mechanic {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #718096;
            margin-bottom: 10px;
        }
        .phd-section-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-top: 10px;
        }
        .phd-section-label:first-child { margin-top: 0; }
        .phd-line-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #1a202c;
            margin-bottom: 6px;
        }
        .phd-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .phd-divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 12px 0;
        }
        .phd-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .phd-total-label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }
        .phd-total-value {
            font-size: 15px;
            font-weight: 700;
            color: #E8001C;
        }
        
        /* Empty state */
        .phd-empty {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }
        .phd-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        /* Loading */
        .phd-loading {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .phd-layout {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 16px;
            }
            .phd-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body data-page="pms-details">

<!-- Header (loaded dynamically) -->
<div id="customerHeader"></div>

<!-- Main content -->
<main class="cu-main">
    <div class="phd-layout" id="phdMain">
        <div class="phd-loading">Loading...</div>
    </div>
</main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCaoJWbwJk0Xi694ARHpdHhiNjT0SpASRs",
    authDomain: "caltex-autopro-1e664.firebaseapp.com",
    projectId: "caltex-autopro-1e664",
    storageBucket: "caltex-autopro-1e664.firebasestorage.app",
    messagingSenderId: "930140433367",
    appId: "1:930140433367:web:cf67bfa388fa517422b992"
  });

  const db = firebase.firestore();
  const params = new URLSearchParams(window.location.search);
  const plate = params.get('plate');
  const desc = params.get('desc');
  const type = params.get('type') || '';

  // ── Vehicle icon SVG based on type ───────────────────────
  function vehicleIconSvg(vehicleType, size) {
    const t = (vehicleType || '').toLowerCase();
    const s = size || 24;
    if (t.includes('truck')) {
      return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`;
    }
    return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l2-4h10l2 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>`;
  }

  async function init() {
    if (!plate) {
      document.getElementById('phdMain').innerHTML =
        '<div class="phd-empty"><div class="phd-empty-icon">⚠️</div><div>No vehicle selected.</div></div>';
      return;
    }

    try {
      // Load maintenance records for this plate
      const snap = await db.collection('maintenance')
        .where('plate', '==', plate)
        .where('status', '==', 'Completed')
        .get();

      const records = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

      // Compute summary
      const totalCost = records.reduce((sum, r) => {
        const raw = r.cost || r.totalCost || '0';
        const num = typeof raw === 'number' ? raw : parseFloat(String(raw).replace(/[₱,]/g, '')) || 0;
        return sum + num;
      }, 0);

      // Get last service odometer from vehicle document
      let lastSvcOdo = '';
      const vSnap = await db.collection('vehicles').where('plate', '==', plate).limit(1).get();
      if (!vSnap.empty) {
        const vData = vSnap.docs[0].data();
        const odo = vData.lastSvcOdo || vData.lastServiceOdometer || '';
        if (odo) lastSvcOdo = String(odo).replace(/[^0-9]/g, '');
      }      // ── LEFT SIDEBAR ──
      const sidebarHtml = `
        <div class="phd-sidebar">
          <div class="phd-vehicle-card">
            <div class="phd-vehicle-plate">${plate}</div>
            <div class="phd-vehicle-desc">${desc || '—'}</div>
            <div class="phd-stats">
              <div class="phd-stat-item">
                <div class="phd-stat-icon" style="background:rgba(0,48,135,0.08);">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#003087" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div>
                  <div class="phd-stat-value">${records.length}</div>
                  <div class="phd-stat-label">Service Records</div>
                </div>
              </div>
              <div class="phd-stat-item">
                <div class="phd-stat-icon" style="background:rgba(232,0,28,0.08);">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8001C" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div>
                  <div class="phd-stat-value">₱${totalCost.toLocaleString('en-PH', {minimumFractionDigits:2})}</div>
                  <div class="phd-stat-label">Total Spent</div>
                </div>
              </div>
              ${lastSvcOdo ? `
              <div class="phd-stat-item">
                <div class="phd-stat-icon" style="background:rgba(13,148,136,0.08);">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                  <div class="phd-stat-value">${parseInt(lastSvcOdo).toLocaleString()} km</div>
                  <div class="phd-stat-label">Last Service Odometer</div>
                </div>
              </div>
              ` : ''}
            </div>
            <a href="customer_pms_history.html" class="phd-back-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Back to PMS History
            </a>
          </div>
        </div>
      `;

      // ── RIGHT CONTENT — Records ──
      let recordsHtml = '';
      if (!records.length) {
        recordsHtml = '<div class="phd-empty"><div class="phd-empty-icon">📋</div><div>No completed services yet.</div></div>';
      } else {
        recordsHtml = `
          <div class="phd-records-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8001C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
            <span class="phd-records-title">Service Records</span>
            <span class="phd-records-count">${records.length} record${records.length !== 1 ? 's' : ''}</span>
          </div>
        ` + records.map((r, idx) => {
          const costDisplay = r.cost || '—';
          return `
            <div class="phd-record-card" style="cursor:pointer;" onclick="phdOpenModal(${idx})">
              <div style="padding:14px;display:flex;align-items:center;gap:12px;">
                <div style="flex:1;min-width:0;">
                  <div style="font-weight:700;font-size:13px;color:#1a202c;">${r.date || '—'}</div>
                  <div style="font-size:11px;color:#718096;margin-top:2px;">${r.mechanic || '—'}</div>
                  ${r.odometer ? `<div style="font-size:10px;color:#718096;margin-top:1px;">${r.odometer} km</div>` : ''}
                </div>
                <div style="text-align:right;flex-shrink:0;">
                  <div style="font-weight:700;font-size:14px;color:#E8001C;">${costDisplay}</div>
                  <span style="background:rgba(22,163,106,0.1);color:#16a34a;font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;">Completed</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>`;
        }).join('');
      }

      document.getElementById('phdMain').innerHTML = sidebarHtml + `<div class="phd-records">${recordsHtml}</div>`;

      // Store records for modal access
      window._phdRecords = records;

    } catch (err) {
      console.error('Error loading PMS history:', err);
      document.getElementById('phdMain').innerHTML =
        `<div class="phd-empty"><div class="phd-empty-icon">⚠️</div><div>Error loading data: ${err.message}</div></div>`;
    }
  }

  // Wait for Firebase Auth before loading data
  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      init();
    } else {
      window.location.href = 'login.html';
    }
  });
</script>
<script src="../static/js/customer_shared.js"></script>
<script>
  fetch('customer_header.html').then(r => r.text()).then(html => {
    document.getElementById('customerHeader').innerHTML = html;
    var sess = JSON.parse(sessionStorage.getItem('cpUser') || '{}');
    if (sess.name) {
      var parts = sess.name.trim().split(' ').filter(Boolean);
      var ini = parts.length >= 2 ? (parts[0][0]+parts[1][0]).toUpperCase() : (parts[0]?parts[0][0].toUpperCase():'CU');
      var av = document.getElementById('cuAvatar'); if(av) av.textContent = ini;
      var hn = document.getElementById('cuHeaderName'); if(hn) hn.textContent = sess.name;
      var mn = document.getElementById('cuAvatarName'); if(mn) mn.textContent = sess.name;
    }
  });
</script>

<!-- View Modal -->
<div id="phdModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)phdCloseModal()">
  <div style="background:white;border-radius:20px;width:100%;max-width:560px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <div style="background:#E8001C;padding:20px;display:flex;align-items:center;gap:14px;flex-shrink:0;">
      <div style="flex:1;min-width:0;">
        <div id="phdModalDate" style="font-size:16px;font-weight:800;color:white;">—</div>
        <div id="phdModalMechanic" style="font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;">—</div>
      </div>
      <button onclick="phdCloseModal()" style="background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">&times;</button>
    </div>
    <div id="phdModalBody" style="padding:20px;overflow-y:auto;"></div>
  </div>
</div>

<script>
  window._phdRecords = [];

  function phdOpenModal(idx) {
    const r = window._phdRecords[idx];
    if (!r) return;

    document.getElementById('phdModalDate').textContent = r.date || '—';
    document.getElementById('phdModalMechanic').textContent = r.mechanic || '—';

    const svcRows = (r.svcRows || []).filter(s => s.name);
    const matRows = (r.matRows || []).filter(m => m.name);
    const issues  = (r.issues  || []).filter(i => i && i.toString().trim());

    function rowSub(row) {
      return (parseFloat((row.cost || '0').replace(/[₱,]/g, '')) || 0) * (parseFloat(row.qty) || 1);
    }

    function detailRow(label, value) {
      return `<div style="display:flex;padding:6px 0;"><span style="width:130px;font-size:12px;color:#718096;font-weight:500;">${label}</span><span style="font-size:13px;font-weight:600;color:#1a202c;">${value || '—'}</span></div>`;
    }

    function itemCard(item, color) {
      const sub = rowSub(item);
      return `<div style="margin-bottom:8px;padding:10px;background:${color}08;border-radius:10px;border:1px solid ${color}20;display:flex;align-items:center;">
        <div style="flex:1;"><div style="font-weight:600;font-size:12px;">${item.name}</div><div style="font-size:10px;color:#718096;">${item.qty} ${item.uom}  •  ₱${parseFloat((item.cost||'0').replace(/[₱,]/g,'')).toFixed(2)} / unit</div></div>
        <span style="font-weight:700;font-size:12px;color:${color};">₱${sub.toLocaleString('en-PH',{minimumFractionDigits:2})}</span>
      </div>`;
    }

    let html = '';
    html += detailRow('Service Date', r.date || '—');
    html += detailRow('Mechanic', r.mechanic || '—');
    html += detailRow('Odometer', r.odometer ? r.odometer + ' km' : '—');
    html += detailRow('Total Cost', r.cost || '—');
    html += `<div style="display:flex;padding:6px 0;"><span style="width:130px;font-size:12px;color:#718096;font-weight:500;">Status</span><span style="background:rgba(22,163,106,0.1);color:#16a34a;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;">Completed</span></div>`;

    if (issues.length) {
      html += `<div style="margin-top:16px;font-size:12px;font-weight:700;color:#4a5568;">Vehicle Issues Reported</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">`;
      html += issues.map(i => `<span style="background:#fff5f5;border:1.5px solid #fed7d7;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:#E8001C;">${i}</span>`).join('');
      html += `</div>`;
    }

    if (svcRows.length) {
      html += `<div style="margin-top:16px;font-size:12px;font-weight:700;color:#2b6cb0;">Services Rendered</div><div style="margin-top:8px;">`;
      html += svcRows.map(s => itemCard(s, '#2b6cb0')).join('');
      html += `</div>`;
    }

    if (matRows.length) {
      html += `<div style="margin-top:16px;font-size:12px;font-weight:700;color:#0d9488;">Materials Used</div><div style="margin-top:8px;">`;
      html += matRows.map(m => itemCard(m, '#0d9488')).join('');
      html += `</div>`;
    }

    html += `<hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0;">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:13px;color:#4a5568;">Total</span><span style="font-weight:700;font-size:16px;color:#E8001C;">${r.cost || '—'}</span></div>`;

    document.getElementById('phdModalBody').innerHTML = html;
    document.getElementById('phdModal').style.display = 'flex';
  }

  function phdCloseModal() {
    document.getElementById('phdModal').style.display = 'none';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') phdCloseModal();
  });
</script>
</body>
</html>
