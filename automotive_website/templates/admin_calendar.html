<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS Calendar</title>
    <link rel="icon" type="image/png" href="../static/img/LOGO_CALTEX.png" />
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/admin.css">
    <style>
      /* ── Calendar Container ── */
      .cal-wrapper {
        max-width: 900px;
        margin: 0 auto;
      }

      /* ── Stats Row ── */
      .cal-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 24px;
      }
      .cal-stat-card {
        background: white;
        border-radius: 14px;
        padding: 16px 18px;
        border: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .cal-stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      }
      .cal-stat-icon {
        width: 40px; height: 40px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .cal-stat-value {
        font-size: 20px; font-weight: 800; color: #1a202c; line-height: 1;
      }
      .cal-stat-label {
        font-size: 11px; color: #718096; font-weight: 500; margin-top: 2px;
      }

      /* ── Calendar Card ── */
      .cal-card {
        background: white;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      }
      .cal-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        border-bottom: 1px solid #f0f4f8;
      }
      .cal-nav-btn {
        width: 36px; height: 36px;
        border-radius: 10px;
        border: 1.5px solid #e2e8f0;
        background: #f7f8fa;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s;
        color: #4a5568;
      }
      .cal-nav-btn:hover {
        background: #E8001C;
        border-color: #E8001C;
        color: white;
      }
      .cal-month-label {
        font-size: 18px; font-weight: 800; color: #1a202c;
        display: flex; align-items: center; gap: 8px;
      }
      .cal-month-label .cal-year {
        font-weight: 500; color: #718096; font-size: 16px;
      }

      /* ── Calendar Grid ── */
      .cal-grid-wrap {
        padding: 16px 24px 20px;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      .cal-dow {
        text-align: center;
        font-size: 11px;
        font-weight: 700;
        color: #a0aec0;
        padding: 8px 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .cal-day {
        text-align: center;
        font-size: 13px;
        padding: 10px 4px;
        border-radius: 10px;
        cursor: default;
        position: relative;
        transition: all 0.15s;
        font-weight: 500;
        color: #2d3748;
      }
      .cal-day.today {
        background: linear-gradient(135deg, #E8001C, #c0001a);
        color: white;
        font-weight: 700;
        box-shadow: 0 3px 10px rgba(232,0,28,0.3);
      }
      .cal-day.has-event {
        background: rgba(232,0,28,0.06);
        font-weight: 700;
        cursor: pointer;
        color: #E8001C;
      }
      .cal-day.has-event:hover {
        background: rgba(232,0,28,0.14);
        transform: scale(1.08);
      }
      .cal-day.has-event::after {
        content: '';
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #E8001C;
      }
      .cal-day.other-month {
        color: #e2e8f0;
      }
      .cal-day.selected {
        background: #003087;
        color: white;
        font-weight: 700;
        box-shadow: 0 3px 10px rgba(0,48,135,0.3);
      }
      .cal-day.selected::after {
        background: white;
      }

      /* ── Legend ── */
      .cal-legend {
        display: flex;
        gap: 16px;
        padding: 14px 24px;
        border-top: 1px solid #f0f4f8;
        flex-wrap: wrap;
      }
      .cal-legend-item {
        display: flex; align-items: center; gap: 6px;
        font-size: 12px; color: #718096; font-weight: 500;
      }
      .cal-legend-dot {
        width: 10px; height: 10px; border-radius: 50%;
      }

      /* ── Vehicle List Panel ── */
      .cal-vehicles-panel {
        margin-top: 20px;
        background: white;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      }
      .cal-vehicles-header {
        padding: 16px 20px;
        border-bottom: 1px solid #f0f4f8;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .cal-vehicles-header-icon {
        width: 32px; height: 32px;
        background: rgba(232,0,28,0.08);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
      }
      .cal-vehicles-title {
        font-size: 14px; font-weight: 700; color: #1a202c;
      }
      .cal-vehicles-count {
        font-size: 11px; font-weight: 700; color: #E8001C;
        background: rgba(232,0,28,0.08);
        padding: 2px 8px; border-radius: 12px;
        margin-left: auto;
      }
      .cal-vehicles-body {
        padding: 12px 16px;
        max-height: 320px;
        overflow-y: auto;
      }
      .cal-v-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #f0f4f8;
        margin-bottom: 8px;
        background: #fafbfc;
        transition: all 0.15s;
      }
      .cal-v-card:hover {
        border-color: #E8001C;
        background: white;
        box-shadow: 0 2px 8px rgba(232,0,28,0.08);
      }
      .cal-v-icon {
        width: 38px; height: 38px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .cal-v-info { flex: 1; }
      .cal-v-plate {
        font-weight: 700; font-size: 13px; color: #1a202c;
      }
      .cal-v-desc {
        font-size: 11px; color: #718096; margin-top: 1px;
      }
      .cal-v-badge {
        font-size: 10px; font-weight: 700;
        padding: 3px 10px; border-radius: 20px;
        white-space: nowrap;
      }
      .cal-empty {
        text-align: center;
        padding: 32px 16px;
        color: #a0aec0;
        font-size: 13px;
      }
      .cal-empty-icon {
        font-size: 32px;
        margin-bottom: 8px;
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .cal-stats { grid-template-columns: repeat(2, 1fr); }
        .cal-grid-wrap { padding: 12px 14px 16px; }
        .cal-card-header { padding: 14px 16px; }
        .cal-day { padding: 8px 2px; font-size: 12px; }
      }
    </style>
</head>

<script>
// ════════════════════════════════════════════════════════════
//  PMS Calendar — Full Page (Improved Design)
// ════════════════════════════════════════════════════════════
var _calYear, _calMonth, _calSelectedDate = null;

function pmsCalInit() {
  var now = new Date();
  _calYear = now.getFullYear();
  _calMonth = now.getMonth();
  pmsCalRender();
  pmsCalUpdateStats();
}

function pmsCalPrev() { _calMonth--; if(_calMonth<0){_calMonth=11;_calYear--;} _calSelectedDate=null; pmsCalRender(); }
function pmsCalNext() { _calMonth++; if(_calMonth>11){_calMonth=0;_calYear++;} _calSelectedDate=null; pmsCalRender(); }

function pmsCalUpdateStats() {
  var vehicles = window._fbVehicles || window.assets || [];
  var total = vehicles.length;
  var overdue = vehicles.filter(function(v){ var s=(v.status||'').toLowerCase(); return s==='overdue'||s.includes('overdue'); }).length;
  var dueSoon = vehicles.filter(function(v){ var s=(v.status||'').toLowerCase(); return s==='due-soon'||s.includes('due'); }).length;
  var active = vehicles.filter(function(v){ var s=(v.status||'').toLowerCase(); return s==='active'||s==='on track'; }).length;

  document.getElementById('calStatTotal').textContent = total;
  document.getElementById('calStatOverdue').textContent = overdue;
  document.getElementById('calStatDueSoon').textContent = dueSoon;
  document.getElementById('calStatActive').textContent = active;
}

function pmsCalRender() {
  var MO = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('pmsCalMonthName').textContent = MO[_calMonth];
  document.getElementById('pmsCalYear').textContent = _calYear;

  var grid = document.getElementById('pmsCalGrid');
  grid.innerHTML = '';

  // Day of week headers
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d) {
    var el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  var firstDay = new Date(_calYear, _calMonth, 1).getDay();
  var daysInMonth = new Date(_calYear, _calMonth + 1, 0).getDate();
  var today = new Date();
  var todayStr = today.getFullYear()+'-'+(today.getMonth()+1).toString().padStart(2,'0')+'-'+today.getDate().toString().padStart(2,'0');

  // Get vehicles with PMS dates
  var vehicles = window._fbVehicles || window.assets || [];
  var pmsDates = {};
  vehicles.forEach(function(v) {
    var nextPms = v.nextPMSDue || '';
    if (nextPms) {
      if (!pmsDates[nextPms]) pmsDates[nextPms] = [];
      pmsDates[nextPms].push(v);
    }
  });

  // Previous month trailing days
  var prevMonthDays = new Date(_calYear, _calMonth, 0).getDate();
  for (var i = firstDay - 1; i >= 0; i--) {
    var el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevMonthDays - i;
    grid.appendChild(el);
  }

  // Current month days
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = _calYear+'-'+(_calMonth+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
    var el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    if (dateStr === todayStr) el.classList.add('today');
    if (_calSelectedDate === dateStr) el.classList.add('selected');
    if (pmsDates[dateStr]) {
      el.classList.add('has-event');
      el.title = pmsDates[dateStr].length + ' vehicle(s) due';
      el.onclick = (function(ds) { return function() { pmsCalSelectDate(ds); }; })(dateStr);
    }
    grid.appendChild(el);
  }

  // Next month leading days
  var totalCells = firstDay + daysInMonth;
  var remaining = (7 - (totalCells % 7)) % 7;
  for (var i = 1; i <= remaining; i++) {
    var el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = i;
    grid.appendChild(el);
  }
}

function pmsCalSelectDate(dateStr) {
  _calSelectedDate = dateStr;
  pmsCalRender();

  var vehicles = window._fbVehicles || window.assets || [];
  var list = vehicles.filter(function(v) { return v.nextPMSDue === dateStr; });

  var panel = document.getElementById('calVehiclesPanel');
  var empty = document.getElementById('calEmptyState');

  if (!list.length) {
    panel.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  panel.style.display = 'block';

  // Format date for display
  var parts = dateStr.split('-');
  var MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var displayDate = MO[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];

  document.getElementById('calVehiclesTitle').textContent = 'Vehicles Due — ' + displayDate;
  document.getElementById('calVehiclesCount').textContent = list.length + ' vehicle' + (list.length!==1?'s':'');

  var body = document.getElementById('calVehiclesBody');
  body.innerHTML = list.map(function(v) {
    var status = (v.status||'Due').toLowerCase();
    var isOverdue = status.includes('overdue');
    var statusLabel = isOverdue ? 'Overdue' : status.includes('due') ? 'Due Soon' : 'Scheduled';
    var statusColor = isOverdue ? '#E8001C' : '#d97706';
    var statusBg = isOverdue ? 'rgba(232,0,28,0.08)' : 'rgba(217,119,6,0.08)';
    var iconBg = isOverdue ? 'rgba(232,0,28,0.08)' : 'rgba(217,119,6,0.08)';
    var iconStroke = isOverdue ? '#E8001C' : '#d97706';

    return '<div class="cal-v-card">'
      + '<div class="cal-v-icon" style="background:'+iconBg+';">'
      + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="'+iconStroke+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'
      + '</div>'
      + '<div class="cal-v-info">'
      + '<div class="cal-v-plate">' + (v.plateNumber||'—') + '</div>'
      + '<div class="cal-v-desc">' + (v.assetDescription||v.owner||'—') + '</div>'
      + '</div>'
      + '<span class="cal-v-badge" style="background:'+statusBg+';color:'+statusColor+';">' + statusLabel + '</span>'
      + '</div>';
  }).join('');
}

// Wait for data then init
function _calWait() {
  var attempts = 0;
  var iv = setInterval(function() {
    attempts++;
    if ((window._fbVehicles||window.assets||[]).length > 0 || attempts >= 15) {
      clearInterval(iv);
      pmsCalInit();
    }
  }, 500);
}
document.addEventListener('DOMContentLoaded', function() { setTimeout(_calWait, 800); });
</script>
