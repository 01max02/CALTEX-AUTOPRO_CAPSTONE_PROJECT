<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" type="image/png" href="../static/img/LOGO_CALTEX.png" />
  <link rel="stylesheet" href="../static/css/login.css" />
</head>
<body>

<div class="card">
  <!-- Left Panel -->
  <div class="header">
    <div class="header-content">
      <img class="logo" src="../static/img/LOGO_CALTEX.png" alt="Caltex Logo" />
      <div class="header-text">
        <img class="wordmark-img" src="../static/img/CALTEX_LETTER.png" alt="Caltex" />
        <span class="tagline">AutoPro</span>
      </div>
      <p class="header-desc">Your trusted automotive service partner.</p>
    </div>
  </div>

  <!-- Right Panel / Form -->
  <div class="form-area">
    <p class="form-title">Login</p>
    <p class="form-sub">Sign in to your account</p>

    <label for="email">Email Address</label>
    <div class="input-wrap">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
      </span>
      <input id="email" type="email" placeholder="Enter your email" autocomplete="email" />
    </div>

    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </span>
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <div class="forgot-row">
      <a href="forgot_password.html">Forgot Password?</a>
    </div>

    <button class="btn-signin" id="signinBtn" type="button">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" id="googleBtn" type="button">
      <!-- Google G logo -->
      <svg class="g-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:#718096;">
      Don't have an account?
      <a href="regsiter.html" style="color:#E8001C;font-weight:700;text-decoration:none;">Sign Up</a>
    </p>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>


<script>
  // ── Helpers ──
  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type === 'success' ? 'show success' : 'show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3500);
  }

  function setLoading(btn, loading, defaultContent) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner${btn.classList.contains('btn-google') ? ' dark' : ''}"></span>`
      : defaultContent;
  }

  // ── Toggle password ──
  const passwordInput = document.getElementById('password');
  
  // Password field - no toggle needed

  // ── Sign In ──
  const signinBtn = document.getElementById('signinBtn');
  const signinDefault = 'Sign In';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') signinBtn.click();
  });

  signinBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      showToast('Please enter email and password.');
      return;
    }

    setLoading(signinBtn, true, signinDefault);
    try {
      console.log('=== Email/Password Login ===');
      console.log('Step 1: Attempting Firebase Auth with:', email);
      const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
      console.log('Step 2: Firebase Auth successful, UID:', cred.user.uid);
      
      // First try by UID (document ID), then fallback to email query
      console.log('Step 3: Looking up user document by UID...');
      let doc = null;
      let docExists = false;
      
      try {
        doc = await firebase.firestore().collection('users').doc(cred.user.uid).get();
        docExists = doc.exists;
        console.log('Step 4: UID lookup result - exists:', docExists);
      } catch (firestoreErr) {
        console.log('Step 4: UID lookup failed:', firestoreErr.code, firestoreErr.message);
        // Continue to email fallback
      }
      
      if (!docExists) {
        console.log('Step 5: User not found by UID, trying email query...');
        try {
          // Fallback: query by email field
          const snap = await firebase.firestore().collection('users')
            .where('email', '==', cred.user.email).limit(1).get();
          console.log('Step 6: Email query returned', snap.size, 'documents');
          if (!snap.empty) {
            doc = snap.docs[0];
            docExists = true;
            console.log('Step 7: User found by email, migrating to UID-based document');
            // Migrate to UID for faster future lookups
            const userData = doc.data();
            await firebase.firestore().collection('users').doc(cred.user.uid).set(userData);
          }
        } catch (queryErr) {
          console.log('Step 6: Email query failed:', queryErr.code, queryErr.message);
        }
      } else {
        console.log('Step 5: User found by UID');
      }

      console.log('Step 8: User doc exists:', docExists);

      if (!docExists) {
        console.log('Step 9: User document not found - creating default customer account');
        // Auto-create user document for users who signed up via mobile app
        // This handles the case where password was reset but document wasn't migrated
        const defaultUserData = {
          name: cred.user.displayName || email.split('@')[0],
          email: cred.user.email,
          role: 'customer',
          status: 'active',
          createdAt: new Date().toISOString(),
        };
        try {
          await firebase.firestore().collection('users').doc(cred.user.uid).set(defaultUserData);
          console.log('Step 10: Default user document created');
          doc = await firebase.firestore().collection('users').doc(cred.user.uid).get();
        } catch (createErr) {
          console.log('Step 10: Failed to create user document:', createErr.code, createErr.message);
          // If we can't create the document, still allow login with default role
          const userData = {
            uid: cred.user.uid,
            email: cred.user.email,
            name: defaultUserData.name,
            role: 'customer',
          };
          console.log('Step 11: Using default customer role due to Firestore error');
          sessionStorage.setItem('cpUser', JSON.stringify(userData));
          redirectByRole('customer');
          return;
        }
      }

      const data = doc.data();
      console.log('Step 11: User data retrieved:', data);
      const role = data.role || 'customer';
      const status = (data.status || 'active').toLowerCase();
      console.log('Step 12: User role:', role, '| status:', status);

      // Block inactive users
      if (status === 'inactive') {
        console.log('Step 13: Account is inactive - signing out');
        await firebase.auth().signOut();
        showToast('Your account has been deactivated. Please contact the administrator.');
        setLoading(signinBtn, false, signinDefault);
        return;
      }

      // Block pending users
      if (status === 'pending') {
        console.log('Step 13: Account is pending approval - signing out');
        await firebase.auth().signOut();
        showToast('Your account is pending admin approval. You will be notified by email once approved.', 'error');
        setLoading(signinBtn, false, signinDefault);
        return;
      }
      
      // Store user in sessionStorage for dashboard auth guards
      const userData = {
        uid: cred.user.uid,
        email: cred.user.email,
        name: data.name || '',
        role: role,
      };
      
      console.log('Step 14: Storing session data for role:', role);
      if (role === 'admin') {
        sessionStorage.setItem('apUser', JSON.stringify(userData));
      } else if (role === 'staff') {
        sessionStorage.setItem('spUser', JSON.stringify(userData));
      } else if (role === 'customer') {
        sessionStorage.setItem('cpUser', JSON.stringify(userData));
      }
      
      // Check if user must change password on first login
      if (data.mustChangePassword === true) {
        console.log('Step 15: First login — redirecting to change password');
        window.location.href = 'change_password.html';
        return;
      }

      console.log('Step 15: Redirecting to dashboard');
      redirectByRole(role);
    } catch (e) {
      console.error('=== Login Error ===');
      console.error('Error Code:', e.code);
      console.error('Error Message:', e.message);
      console.error('Full Error:', e);
      
      let msg = 'Invalid email or password.';
      
      // Handle specific Firebase Auth errors
      if (e.code === 'auth/user-not-found') {
        msg = 'No account found with this email. Please sign up first.';
      } else if (e.code === 'auth/wrong-password') {
        msg = 'Incorrect password. Please try again.';
      } else if (e.code === 'auth/invalid-credential') {
        msg = 'Invalid email or password.';
      } else if (e.code === 'permission-denied') {
        msg = 'Permission denied. Firestore rules may need to be updated. Please contact the administrator.';
      } else if (e.code && !e.code.startsWith('auth/')) {
        msg = e.message || 'Login failed.';
      }
      
      showToast(msg);
      setLoading(signinBtn, false, signinDefault);
    }
  });

  // ── Google Sign-In ──
  // Using GoogleSignInModule from google_sign_in.html
  // The module is auto-initialized and handles all Google Sign-In logic

  // ── Role redirect ──
  function redirectByRole(role) {
    console.log('Redirecting role:', role); // Debug log
    const map = {
      admin:    'admin_dashboard.html',
      staff:    'staff_dashboard.html',
      customer: 'customer_dashboard.html',
    };
    const target = map[role] || 'customer_dashboard.html';
    console.log('Redirecting to:', target); // Debug log
    window.location.href = target;
  }

  // ── Forgot Password Modal ──
  // Redirects to forgot_password.html (handled via href link)
</script>

</body>
