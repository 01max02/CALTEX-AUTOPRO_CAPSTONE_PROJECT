<!-- ── Smart Reports AI Floating Widget ── -->
<!-- Include this file in admin pages that need the AI chatbot -->
<!-- Requires: window.assets, window.inventory, window.serviceTransactions from admin_firebase.js -->

<!-- Floating toggle button -->
<button id="ragAiToggleBtn" onclick="ragAiToggle()"
  title="Smart Reports AI"
  style="position:fixed;bottom:2rem;right:2rem;z-index:1200;
         width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
         background:linear-gradient(135deg,#E8001C,#c0001a);
         box-shadow:0 4px 18px rgba(232,0,28,0.4);
         display:flex;align-items:center;justify-content:center;
         transition:transform 0.2s,box-shadow 0.2s;"
  onmouseover="this.style.transform='scale(1.1)';this.style.boxShadow='0 6px 24px rgba(232,0,28,0.5)'"
  onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 18px rgba(232,0,28,0.4)'">
  <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="white" stroke="none">
    <path d="M20 6h-1V3c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v14l4-4h9c.55 0 1-.45 1-1V6h2v9H7v2c0 .55.45 1 1 1h10l4 4V7c0-.55-.45-1-1-1z"/>
  </svg>
</button>

<!-- Floating AI chat panel -->
<div id="ragAiPanel"
  style="display:none;position:fixed;bottom:6rem;right:2rem;z-index:1201;
         width:380px;height:560px;max-height:calc(100vh - 8rem);background:#fff;border-radius:18px;
         box-shadow:0 8px 40px rgba(0,0,0,0.18);
         border:1px solid #e2e8f0;overflow:hidden;
         display:none;flex-direction:column;
         animation:ragAiSlideIn 0.22s ease;">

  <!-- Panel header -->
  <div style="background:linear-gradient(135deg,#E8001C,#c0001a);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <div style="width:34px;height:34px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;">🤖</div>
    <div style="flex:1;">
      <div style="color:#fff;font-size:13px;font-weight:700;">Smart Reports AI</div>
    </div>
    <button onclick="ragAiClear()" style="background:rgba(255,255,255,0.15);border:none;color:white;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;">Clear</button>
    <button onclick="ragAiToggle()" style="background:rgba(255,255,255,0.15);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">×</button>
  </div>

  <!-- Messages area -->
  <div id="ragAiChat" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#F7F8FA;"></div>

  <!-- Quick chips -->
  <div id="ragAiChips" style="display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;background:white;border-top:1px solid #f0f4f8;max-height:70px;overflow-y:auto;">
    <button class="rag-chip" onclick="ragAiSend('Show fleet summary')">📊 Fleet</button>
    <button class="rag-chip" onclick="ragAiSend('Which vehicles have PMS overdue?')">⚠️ Overdue</button>
    <button class="rag-chip" onclick="ragAiSend('What items are low in stock?')">📦 Low stock</button>
    <button class="rag-chip" onclick="ragAiSend('Total repair cost this month')">💰 Cost</button>
    <button class="rag-chip" onclick="ragAiSend('How many services are pending?')">⏳ Pending</button>
    <button class="rag-chip" onclick="ragAiSend('What are the fast moving inventory items?')">📈 Fast moving</button>
    <button class="rag-chip" onclick="ragAiSend('Generate inventory report PDF')">📄 PDF Report</button>
    <button class="rag-chip" onclick="ragAiSend('Generate issuance report excel')">📊 Excel Report</button>
  </div>

  <!-- Input bar -->
  <div style="display:flex;gap:8px;align-items:flex-end;padding:10px 12px;background:white;border-top:1px solid #e2e8f0;flex-shrink:0;">
    <textarea id="ragAiInput" placeholder="Ask about fleet, inventory, maintenance..."
      rows="1" style="flex:1;border:1.5px solid #e2e8f0;border-radius:20px;padding:8px 14px;font-size:12px;font-family:inherit;color:#1a202c;background:#F7F8FA;outline:none;resize:none;max-height:80px;overflow-y:auto;line-height:1.4;"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ragAiSend();}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"
      onfocus="this.style.borderColor='#E8001C';this.style.background='white'"
      onblur="this.style.borderColor='#e2e8f0';this.style.background='#F7F8FA'"></textarea>
    <button onclick="ragAiSend()" style="width:36px;height:36px;background:linear-gradient(135deg,#E8001C,#c0001a);border:none;border-radius:50%;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(232,0,28,0.3);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(45deg)"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<style>
@keyframes ragAiSlideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.rag-chip { padding:4px 10px;background:#f7f8fa;border:1.5px solid #e2e8f0;border-radius:16px;font-size:11px;font-weight:500;color:#4a5568;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit; }
.rag-chip:hover { background:#E8001C;color:white;border-color:#E8001C; }
#ragAiChat .rag-row { display:flex;gap:8px;align-items:flex-end; }
#ragAiChat .rag-row.user { flex-direction:row-reverse; }
#ragAiChat .rag-av { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0; }
#ragAiChat .rag-av.ai { background:linear-gradient(135deg,#E8001C,#c0001a);color:white; }
#ragAiChat .rag-av.usr { background:linear-gradient(135deg,#E8001C,#C41E3A);color:white;font-size:10px;font-weight:700; }
#ragAiChat .rag-bub { max-width:80%;padding:10px 13px;border-radius:14px;font-size:12px;line-height:1.6; }
#ragAiChat .rag-bub.ai { background:white;color:#1a202c;border-radius:4px 14px 14px 14px;box-shadow:0 1px 6px rgba(0,0,0,0.06); }
#ragAiChat .rag-bub.usr { background:linear-gradient(135deg,#E8001C,#C41E3A);color:white;border-radius:14px 4px 14px 14px;box-shadow:0 2px 6px rgba(232,0,28,0.2); }
#ragAiChat .rag-bub table { width:100%;border-collapse:collapse;margin-top:6px;font-size:11px; }
#ragAiChat .rag-bub table th { background:#f7f8fa;padding:4px 6px;text-align:left;font-weight:700;color:#4a5568;border-bottom:1.5px solid #e2e8f0;font-size:10px; }
#ragAiChat .rag-bub table td { padding:4px 6px;border-bottom:1px solid #f0f4f8;color:#1a202c; }
#ragAiChat .rag-bub .sr-tag { display:inline-block;padding:1px 6px;border-radius:12px;font-size:10px;font-weight:700;margin:1px 1px; }
.rag-typing { display:flex;gap:4px;align-items:center;padding:8px 12px; }
.rag-typing span { width:6px;height:6px;background:#a0aec0;border-radius:50%;animation:ragBounce .9s ease-in-out infinite; }
.rag-typing span:nth-child(2) { animation-delay:.15s; }
.rag-typing span:nth-child(3) { animation-delay:.3s; }
@keyframes ragBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
</style>

<script>
// ════════════════════════════════════════════════════════════
//  Smart Reports AI — Floating Widget
// ════════════════════════════════════════════════════════════
(function() {
var _ragInitials = 'AD';
var _ragReady = false;
var _ragSessionId = null;  // server-side session key — sent back on each request
var _ragRateLimited = false;

// ── Rate-limit helpers ────────────────────────────────────────────────────
function _ragSetRateLimited(limited, resetIn) {
  _ragRateLimited = limited;
  var input  = document.getElementById('ragAiInput');
  var sendBtn = input ? input.closest('div').querySelector('button') : null;
  var banner  = document.getElementById('ragRateBanner');

  if (limited) {
    if (input)   { input.disabled = true;  input.placeholder = 'AI unavailable — daily limit reached'; }
    if (sendBtn) { sendBtn.disabled = true; sendBtn.style.opacity = '0.45'; sendBtn.style.cursor = 'not-allowed'; }
    if (!banner) {
      // Insert banner below the panel header
      var chat = document.getElementById('ragAiChat');
      if (chat && chat.parentNode) {
        var b = document.createElement('div');
        b.id = 'ragRateBanner';
        b.style.cssText =
          'background:#fff7ed;border-bottom:2px solid #fb923c;' +
          'padding:10px 14px;font-size:11.5px;color:#9a3412;display:flex;' +
          'align-items:flex-start;gap:8px;flex-shrink:0;line-height:1.55;';
        b.innerHTML =
          '<span style="font-size:16px;line-height:1.2;">🚫</span>' +
          '<div><strong style="display:block;margin-bottom:2px;">AI unavailable — daily token limit reached</strong>' +
          'Groq free-tier quota is exhausted. Resets in <strong>' + (resetIn || 'some time') + '</strong>. ' +
          'Chat is disabled until then.</div>';
        chat.parentNode.insertBefore(b, chat);
      }
    }
  } else {
    if (input)   { input.disabled = false; input.placeholder = 'Ask about fleet, inventory, maintenance...'; }
    if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = ''; sendBtn.style.cursor = ''; }
    if (banner)  { banner.remove(); }
  }
}

window.ragAiToggle = function() {
  var panel = document.getElementById('ragAiPanel');
  if (!panel) return;
  var isOpen = panel.style.display === 'flex';
  panel.style.display = isOpen ? 'none' : 'flex';
  // Update FAB icon: X when open, chat bubbles when closed
  var btn = document.getElementById('ragAiToggleBtn');
  if (btn) {
    var svg = btn.querySelector('svg');
    if (svg) {
      if (!isOpen) {
        // Now opening — show X
        svg.innerHTML = '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>';
      } else {
        // Now closing — show chat icon
        svg.innerHTML = '<path d="M20 6h-1V3c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v14l4-4h9c.55 0 1-.45 1-1V6h2v9H7v2c0 .55.45 1 1 1h10l4 4V7c0-.55-.45-1-1-1z"/>';
      }
    }
  }
};

// Get admin initials
if (typeof firebase !== 'undefined') {
  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return;
    firebase.firestore().collection('users').doc(user.uid).get().then(function(doc) {
      if (!doc.exists) return;
      var name = doc.data().name || '';
      var parts = name.trim().split(' ').filter(Boolean);
      _ragInitials = parts.length >= 2 ? (parts[0][0]+parts[1][0]).toUpperCase() : (parts[0]?parts[0][0].toUpperCase():'AD');
    });
  });
}

// Watch for data readiness + check RAG AI health
function _ragWatch() {
  var attempts = 0;
  var iv = setInterval(function() {
    attempts++;
    var v = (window.assets||[]).length, i = (window.inventory||[]).length, s = (window.serviceTransactions||[]).length;
    if (v > 0 || i > 0 || s > 0 || attempts >= 15) {
      clearInterval(iv);
      _ragReady = true;
      // Check RAG AI engine health
      fetch('/api/ai-health').then(function(r){return r.json();}).then(function(d){
        var dot = document.getElementById('ragAiDot');
        var txt = document.getElementById('ragAiStatus');
        if (d.online) {
          if (dot) dot.style.background = '#38a169';
          if (txt) { txt.style.color = '#38a169'; txt.textContent = 'Online · RAG AI + Live data'; }
        } else {
          if (dot) dot.style.background = '#d69e2e';
          if (txt) { txt.style.color = '#d69e2e'; txt.textContent = 'Online · Local mode (no AI)'; }
        }
      }).catch(function(){
        var dot = document.getElementById('ragAiDot');
        var txt = document.getElementById('ragAiStatus');
        if (dot) dot.style.background = '#d69e2e';
        if (txt) { txt.style.color = '#d69e2e'; txt.textContent = 'Online · Local mode'; }
      });
    }
  }, 600);
}
setTimeout(_ragWatch, 1000);
setTimeout(_ragShowWelcome, 1100);

function _ragEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function _ragAppend(role, html) {
  var chat = document.getElementById('ragAiChat');
  var row = document.createElement('div');
  row.className = 'rag-row' + (role==='user'?' user':'');
  var av = role==='user' ? '<div class="rag-av usr">'+_ragInitials+'</div>' : '<div class="rag-av ai">🤖</div>';
  var bub = '<div class="rag-bub '+role+'">'+html+'</div>';
  row.innerHTML = role==='user' ? bub+av : av+bub;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function _ragTyping() {
  var chat = document.getElementById('ragAiChat');
  var row = document.createElement('div');
  row.className='rag-row'; row.id='ragTyping';
  row.innerHTML='<div class="rag-av ai">🤖</div><div class="rag-bub ai"><div class="rag-typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(row); chat.scrollTop=chat.scrollHeight;
}
function _ragRemoveTyping() { var el=document.getElementById('ragTyping'); if(el)el.remove(); }

window.ragAiSend = function(preset) {
  var input = document.getElementById('ragAiInput');
  var text = (preset||input.value).trim();
  if (!text) return;
  if (_ragRateLimited) { return; }  // blocked while rate-limited
  if (!_ragReady) { _ragAppend('ai','⏳ <strong>Still loading data…</strong> Please wait.'); return; }
  document.getElementById('ragAiChips').style.display='none';
  _ragAppend('user', _ragEsc(text));
  input.value=''; input.style.height='auto';
  _ragTyping();

  // Call the Flask AI endpoint — session_id enables server-side memory
  fetch('/api/ai-chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message:    text,
      user_type:  'admin',
      session_id: _ragSessionId,
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    _ragRemoveTyping();
    // Persist the session_id returned by the backend for memory continuity
    if (data.session_id) { _ragSessionId = data.session_id; }

    // ── Rate limit notice ─────────────────────────────────────────────────
    if (data.rate_limited) {
      _ragSetRateLimited(true, data.reset_in || 'some time');
      var resetMsg = data.reset_in || 'some time';
      _ragAppend('ai',
        '<div style="background:#fff7ed;border:1.5px solid #fb923c;border-radius:10px;padding:10px 13px;color:#9a3412;">' +
        '<div style="font-size:13px;font-weight:700;margin-bottom:5px;">🚫 AI Unavailable</div>' +
        '<div style="font-size:11.5px;line-height:1.6;">' +
        'The AI service has reached its <strong>daily token limit</strong> (Groq free tier).<br>' +
        '⏱️ Resets in <strong>' + resetMsg + '</strong>.<br>' +
        'You cannot send new messages until the quota resets automatically.</div>' +
        '</div>');
      return;
    }

    if (data.offline || !data.success) {
      // RAG engine not available — fall back to local JS engine
      var result = _ragProcess(text);
      _ragAppend('ai', result.html);
    } else if (data.report_ready) {
      // Report is ready — show message with download button
      var answer = (data.answer || '').replace(/\n/g, '<br>');
      var btnHtml = '<div style="margin-top:8px;display:flex;gap:6px;">'
        + '<button onclick="ragDownloadReport(\'' + data.report_type + '\',\'' + data.report_format + '\')" '
        + 'style="background:#E8001C;color:white;border:none;padding:6px 14px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">📥 Download ' + (data.report_format||'pdf').toUpperCase() + '</button>';
      // Offer the other format too
      var otherFmt = data.report_format === 'pdf' ? 'excel' : 'pdf';
      btnHtml += '<button onclick="ragDownloadReport(\'' + data.report_type + '\',\'' + otherFmt + '\')" '
        + 'style="background:#f7f8fa;color:#4a5568;border:1.5px solid #e2e8f0;padding:6px 14px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">📥 ' + otherFmt.toUpperCase() + '</button>';
      btnHtml += '</div>';
      _ragAppend('ai', answer + btnHtml);
    } else if (data.answer) {
      // Format the answer nicely
      var answer = data.answer.replace(/\n/g, '<br>').replace(/^- /gm, '• ');
      _ragAppend('ai', answer);
    } else {
      var result = _ragProcess(text);
      _ragAppend('ai', result.html);
    }
  })
  .catch(function(err) {
    // Network error or Flask down — fall back to local JS query engine
    _ragRemoveTyping();
    var result = _ragProcess(text);
    _ragAppend('ai', result.html);
  });
};

window.ragAiClear = function() {
  // Clear server-side session memory
  if (_ragSessionId) {
    fetch('/api/ai-session/' + _ragSessionId, { method: 'DELETE' }).catch(function(){});
    _ragSessionId = null;
  }
  _ragSetRateLimited(false);
  document.getElementById('ragAiChat').innerHTML='';
  document.getElementById('ragAiChips').style.display='flex';
  _ragShowWelcome();
};

window.ragDownloadReport = function(reportType, format) {
  _ragAppend('ai', '⏳ Generating ' + format.toUpperCase() + ' report...');
  fetch('/api/ai-report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ report_type: reportType, format: format })
  })
  .then(function(res) {
    if (!res.ok) throw new Error('Report generation failed');
    return res.blob();
  })
  .then(function(blob) {
    var ext = format === 'pdf' ? '.pdf' : '.xlsx';
    var filename = reportType + '_report' + ext;
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    _ragAppend('ai', '✅ <strong>' + filename + '</strong> downloaded successfully!');
  })
  .catch(function(err) {
    _ragAppend('ai', '❌ Failed to generate report: ' + err.message);
  });
};

function _ragShowWelcome() {
  var chat = document.getElementById('ragAiChat');
  if (!chat) return;
  var div = document.createElement('div');
  div.className='rag-row';
  div.innerHTML='<div class="rag-av ai">🤖</div>'
    +'<div class="rag-bub ai" style="max-width:85%;">'
    +'<div style="font-size:13px;font-weight:700;color:#1a202c;margin-bottom:3px;">Hello! I\'m your Smart Reports AI 👋</div>'
    +'<div style="font-size:11px;color:#718096;line-height:1.5;">Ask me about fleet, inventory, maintenance costs, and more.</div>'
    +'</div>';
  chat.appendChild(div);
}

// ════════════════════════════════════════════════════════════
//  Query Engine (same logic as admin_smart_reports.html)
// ════════════════════════════════════════════════════════════
function _ragProcess(query) {
  var q = query.toLowerCase().trim();
  var assets=window.assets||[], inventory=window.inventory||[], services=window.serviceTransactions||[], issuances=window.issuances||[], users=window.users||[];
  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtP(n){return '₱'+(parseFloat(n)||0).toLocaleString('en-PH',{minimumFractionDigits:2});}
  function tag(t,c,b){return '<span class="sr-tag" style="background:'+b+';color:'+c+';">'+_ragEsc(t)+'</span>';}
  function isOverdue(a){var s=(a.status||'').toLowerCase();return s==='overdue'||s.includes('overdue');}
  function isMaint(a){var s=(a.status||'').toLowerCase();return s==='maintenance'||s.includes('maintenance');}
  function isDueSoon(a){var s=(a.status||'').toLowerCase();return s==='due-soon'||s.includes('due');}
  function isActive(a){var s=(a.status||'').toLowerCase();return s==='active'||s==='on track';}
  function isLowStock(i){return (parseInt(i.stock)||0)<=(parseInt(i.minLevel)||0);}
  function statusTag(raw){
    var s=(raw||'').toLowerCase(),label=raw||'—';
    if(s==='overdue'||s.includes('overdue'))label='Overdue';
    else if(s==='maintenance'||s.includes('maintenance'))label='Maintenance';
    else if(s==='due-soon'||s.includes('due'))label='Due Soon';
    else if(s==='active'||s==='on track')label='Active';
    else if(s==='pending')label='Pending';
    else if(s==='ongoing')label='Ongoing';
    else if(s==='completed')label='Completed';
    else if(s==='low')label='Low';
    else if(s==='ok')label='OK';
    var map={'Overdue':['#E8001C','rgba(232,0,28,0.1)'],'Maintenance':['#d69e2e','rgba(214,158,46,0.1)'],'Due Soon':['#d97706','rgba(217,119,6,0.1)'],'Active':['#38a169','rgba(56,161,105,0.1)'],'Pending':['#718096','rgba(113,128,150,0.1)'],'Ongoing':['#d69e2e','rgba(214,158,46,0.1)'],'Completed':['#003087','rgba(0,48,135,0.1)'],'Low':['#E8001C','rgba(232,0,28,0.1)'],'OK':['#38a169','rgba(56,161,105,0.1)']};
    var c=map[label]||['#718096','rgba(113,128,150,0.1)'];
    return tag(label,c[0],c[1]);
  }
  function tbl(h,r){if(!r.length)return '<em style="color:#718096;font-size:11px;">No records found.</em>';return '<table><thead><tr>'+h.map(function(x){return '<th>'+_ragEsc(x)+'</th>';}).join('')+'</tr></thead><tbody>'+r.map(function(row){return '<tr>'+row.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';}
  function ret(html){return {html:html};}

  // Fleet summary
  if(q.includes('fleet summary')||q.includes('summary')||q.includes('overview')){
    var tot=assets.length,ov=assets.filter(isOverdue).length,mt=assets.filter(isMaint).length,ds=assets.filter(isDueSoon).length,ac=assets.filter(isActive).length,ls=inventory.filter(isLowStock).length;
    return ret('<strong>📊 Fleet Summary</strong><br>• Vehicles: <strong>'+tot+'</strong> (Active: '+ac+', Maintenance: '+mt+')<br>• PMS Overdue: <strong>'+ov+'</strong>, Due Soon: <strong>'+ds+'</strong><br>• Low Stock Items: <strong>'+ls+'</strong><br>• Services: <strong>'+services.length+'</strong>');
  }
  // All vehicles
  if((q.includes('all')&&q.includes('vehicle'))||q.includes('show vehicle')||q.includes('list vehicle')){
    if(!assets.length)return ret('🚗 No vehicles found.');
    var rows=assets.slice(0,15).map(function(a){return [_ragEsc(a.plateNumber||'—'),_ragEsc(a.assetDescription||'—'),statusTag(a.status)];});
    return ret('<strong>🚗 Vehicles ('+assets.length+')</strong>'+tbl(['Plate','Description','Status'],rows));
  }
  // Under maintenance
  if(q.includes('under maintenance')||(q.includes('maintenance')&&!q.includes('cost'))){
    var list=assets.filter(isMaint);
    if(!list.length)return ret('✅ No vehicles under maintenance.');
    var rows=list.map(function(a){return [_ragEsc(a.plateNumber||'—'),_ragEsc(a.assetDescription||'—'),_ragEsc(a.owner||'—')];});
    return ret('<strong>🔧 Under Maintenance ('+list.length+')</strong>'+tbl(['Plate','Description','Owner'],rows));
  }
  // PMS overdue
  if(q.includes('overdue')){
    var list=assets.filter(isOverdue);
    if(!list.length)return ret('✅ No PMS overdue vehicles.');
    var rows=list.map(function(a){return [_ragEsc(a.plateNumber||'—'),_ragEsc(a.assetDescription||'—'),_ragEsc(a.owner||'—')];});
    return ret('<strong>⚠️ PMS Overdue ('+list.length+')</strong>'+tbl(['Plate','Description','Owner'],rows));
  }
  // Due soon
  if(q.includes('due this week')||q.includes('due soon')||(q.includes('pms')&&q.includes('due'))){
    var list=assets.filter(isDueSoon);
    if(!list.length)return ret('✅ No PMS due soon.');
    var rows=list.map(function(a){return [_ragEsc(a.plateNumber||'—'),_ragEsc(a.assetDescription||'—'),statusTag(a.status)];});
    return ret('<strong>📅 PMS Due Soon ('+list.length+')</strong>'+tbl(['Plate','Description','Status'],rows));
  }
  // Low stock
  if(q.includes('low')&&q.includes('stock')){
    var list=inventory.filter(isLowStock);
    if(!list.length)return ret('✅ All stock levels adequate.');
    var rows=list.map(function(i){return [_ragEsc(i.itemName||'—'),String(i.stock||0)+'/'+String(i.minLevel||0),_ragEsc(i.unit||'')];});
    return ret('<strong>📦 Low Stock ('+list.length+')</strong>'+tbl(['Item','Stock/Min','Unit'],rows));
  }
  // Inventory summary
  if(q.includes('inventory')){
    var tot=inventory.length,ls=inventory.filter(isLowStock).length,ok=tot-ls;
    return ret('<strong>🗃️ Inventory</strong><br>• Total: <strong>'+tot+'</strong><br>• OK: <strong>'+ok+'</strong><br>• Low: <strong>'+ls+'</strong>');
  }
  // Cost
  if(q.includes('cost')||q.includes('expense')){
    var now=new Date();
    var thisMonth=services.filter(function(s){var d=s.dateServiced||s.date||'';if(!d)return false;var dt=new Date(d);return !isNaN(dt)&&dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();});
    var mCost=thisMonth.reduce(function(s,t){return s+(parseFloat(t.totalCost||t.cost||0)||0);},0);
    var aCost=services.reduce(function(s,t){return s+(parseFloat(t.totalCost||t.cost||0)||0);},0);
    return ret('<strong>💰 Maintenance Cost</strong><br>• This month: <strong>'+fmtP(mCost)+'</strong> ('+thisMonth.length+' services)<br>• All time: <strong>'+fmtP(aCost)+'</strong>');
  }
  // Pending
  if(q.includes('pending')){
    var list=services.filter(function(s){return (s.status||'').toLowerCase()==='pending';});
    if(!list.length)return ret('✅ No pending services.');
    var rows=list.map(function(s){return [_ragEsc(s.plate||'—'),_ragEsc(s.mechanicName||s.mechanic||'—'),_ragEsc(s.dateServiced||s.date||'—')];});
    return ret('<strong>⏳ Pending ('+list.length+')</strong>'+tbl(['Plate','Mechanic','Date'],rows));
  }
  // Fast moving
  if(q.includes('fast')||q.includes('most used')){
    var counts={};
    issuances.forEach(function(i){var n=i.itemName||i.item||'';if(n)counts[n]=(counts[n]||0)+(parseFloat(i.quantity||i.qty)||0);});
    var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,8);
    if(!sorted.length)return ret('No issuance data found.');
    var rows=sorted.map(function(k){return [_ragEsc(k),String(counts[k])];});
    return ret('<strong>📈 Fast Moving Items</strong>'+tbl(['Item','Total Issued'],rows));
  }
  // Users
  if(q.includes('user')||q.includes('staff')){
    var adm=users.filter(function(u){return u.role==='admin';}).length,stf=users.filter(function(u){return u.role==='staff';}).length,cus=users.filter(function(u){return u.role==='customer';}).length;
    return ret('<strong>👥 Users ('+users.length+')</strong><br>• Admin: '+adm+'<br>• Staff: '+stf+'<br>• Customer: '+cus);
  }
  // Fallback
  return ret('🤔 Try: <em>fleet summary, overdue, low stock, cost, pending, fast moving</em>');
}

})();
</script>
