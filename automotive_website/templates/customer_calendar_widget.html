<!-- ── Customer Calendar Floating Widget ── -->
<!-- Include on any customer page. Loads the logged-in customer's own bookings + PMS dates. -->

<!-- FAB -->
<button id="cuCalBtn" onclick="cuCalToggle()" title="My Calendar"
  style="position:fixed;bottom:2rem;right:2rem;z-index:1200;
         width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
         background:linear-gradient(135deg,#E8001C,#c0001a);
         box-shadow:0 4px 16px rgba(232,0,28,0.4);
         display:flex;align-items:center;justify-content:center;
         transition:transform 0.2s,box-shadow 0.2s;"
  onmouseover="this.style.transform='scale(1.1)';this.style.boxShadow='0 6px 24px rgba(232,0,28,0.5)'"
  onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 16px rgba(232,0,28,0.4)'">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
       fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/>
    <line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
  <span id="cuCalDot" style="display:none;position:absolute;top:4px;right:4px;
        width:10px;height:10px;border-radius:50%;background:#fbbf24;
        border:2px solid #fff;"></span>
</button>

<!-- Panel -->
<div id="cuCalPanel"
  style="display:none;position:fixed;bottom:5.5rem;right:2rem;z-index:1199;
         width:320px;background:#fff;border-radius:18px;
         box-shadow:0 8px 40px rgba(0,0,0,0.18);
         border:1px solid #e2e8f0;overflow:hidden;
         animation:cuCalSlideIn 0.22s ease;">

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#E8001C,#c0001a);padding:1rem 1.1rem 0.9rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span style="font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.9);
                     text-transform:uppercase;letter-spacing:0.5px;">My Calendar</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span id="cuCalYearBadge"
          style="font-size:0.72rem;font-weight:700;color:rgba(255,255,255,0.7);
                 background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:20px;"></span>
        <button onclick="cuCalToggle()"
          style="width:24px;height:24px;border:none;background:rgba(255,255,255,0.2);
                 border-radius:6px;cursor:pointer;color:#fff;font-size:1rem;
                 display:flex;align-items:center;justify-content:center;line-height:1;">
          &times;
        </button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <button onclick="cuCalNav(-1)"
        style="width:26px;height:26px;border:none;background:rgba(255,255,255,0.2);
               border-radius:6px;cursor:pointer;color:#fff;font-size:1rem;
               display:flex;align-items:center;justify-content:center;line-height:1;">&#8249;</button>
      <span id="cuCalMonthLabel" style="font-size:1.1rem;font-weight:800;color:#fff;"></span>
      <button onclick="cuCalNav(1)"
        style="width:26px;height:26px;border:none;background:rgba(255,255,255,0.2);
               border-radius:6px;cursor:pointer;color:#fff;font-size:1rem;
               display:flex;align-items:center;justify-content:center;line-height:1;">&#8250;</button>
    </div>
  </div>

  <!-- Calendar grid -->
  <div style="padding:0.75rem 0.9rem 0.5rem;">
    <div id="cuCalGrid"></div>
  </div>

  <!-- Selected day detail -->
  <div id="cuCalDayDetail"
    style="display:none;margin:0 0.9rem 0.75rem;padding:0.75rem;
           background:#f7f8fa;border-radius:10px;border:1px solid #e2e8f0;">
    <div id="cuCalDayTitle"
      style="font-size:0.7rem;font-weight:700;color:#718096;
             text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.5rem;"></div>
    <div id="cuCalDayList"></div>
  </div>

  <!-- Legend -->
  <div style="padding:0 0.9rem 0.85rem;display:flex;flex-wrap:wrap;gap:0.5rem 0.9rem;">
    <span style="display:flex;align-items:center;gap:4px;font-size:0.68rem;color:#4a5568;">
      <span style="width:8px;height:8px;border-radius:2px;background:#E8001C;display:inline-block;"></span>Overdue
    </span>
    <span style="display:flex;align-items:center;gap:4px;font-size:0.68rem;color:#4a5568;">
      <span style="width:8px;height:8px;border-radius:2px;background:#ed8936;display:inline-block;"></span>This Week
    </span>
    <span style="display:flex;align-items:center;gap:4px;font-size:0.68rem;color:#4a5568;">
      <span style="width:8px;height:8px;border-radius:2px;background:#003087;display:inline-block;"></span>Upcoming
    </span>
    <span style="display:flex;align-items:center;gap:4px;font-size:0.68rem;color:#4a5568;">
      <span style="width:8px;height:8px;border-radius:2px;background:#7c3aed;display:inline-block;"></span>Booked
    </span>
    <span style="display:flex;align-items:center;gap:4px;font-size:0.68rem;color:#4a5568;">
      <span style="width:8px;height:8px;border-radius:50%;background:#0d9488;display:inline-block;"></span>Today
    </span>
    <span style="display:flex;align-items:center;gap:4px;font-size:0.68rem;color:#4a5568;">
      <span style="width:8px;height:8px;border-radius:2px;background:#cbd5e0;display:inline-block;"></span>Past / Closed
    </span>
  </div>
</div>

<style>
@keyframes cuCalSlideIn {
  from { opacity:0; transform:translateY(12px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.cu-cal-day {
  position:relative; min-height:36px; border-radius:7px;
  padding:4px 4px 3px; cursor:default;
  border:1.5px solid transparent;
  transition:border-color 0.15s,background 0.15s;
  background:#f7f8fa;
}
.cu-cal-day.other-month { opacity:0.35; }
.cu-cal-day.today-cell  { border-color:#0d9488 !important; background:#f0fdfa; }
.cu-cal-day.past-cell   { background:#f1f5f9; }
.cu-cal-day.has-evt     { cursor:pointer; }
.cu-cal-day.has-evt:hover { border-color:#cbd5e0; background:#fff; }
.cu-cal-day.selected    { border-color:#003087 !important; background:#ebf8ff; }
.cu-cal-day-num { font-size:0.78rem; font-weight:600; color:#4a5568; line-height:1; }
.cu-cal-day.today-cell .cu-cal-day-num { color:#0d9488; font-weight:800; }
.cu-cal-day.past-cell  .cu-cal-day-num { color:#c4cad4; }
.cu-cal-dots { display:flex; flex-wrap:wrap; gap:2px; margin-top:4px; }
.cu-cal-dot  { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
.cu-detail-row {
  display:flex; align-items:center; gap:10px; padding:8px 10px;
  border-radius:8px; margin-bottom:6px;
  background:#fff; border:1px solid #e2e8f0;
}
</style>

<script>
(function() {
  'use strict';

  var CAL_MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
  var DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var _calYear   = new Date().getFullYear();
  var _calMonth  = new Date().getMonth();
  var _events    = {};   // 'YYYY-MM-DD' → [{type,label,daysUntil,urgency,...}]
  var _selDay    = null;
  var _open      = false;
  var _loaded    = false;

  function _urgencyColor(u) {
    if (u === 'overdue') return '#E8001C';
    if (u === 'week')    return '#ed8936';
    if (u === 'booking') return '#7c3aed';
    return '#003087';
  }

  // ── Toggle ──────────────────────────────────────────────────
  window.cuCalToggle = function() {
    _open = !_open;
    var panel = document.getElementById('cuCalPanel');
    if (!panel) return;
    panel.style.display = _open ? 'block' : 'none';
    if (_open) {
      if (!_loaded) _loadData();
      else _renderGrid();
    }
  };

  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!_open) return;
    var panel = document.getElementById('cuCalPanel');
    var btn   = document.getElementById('cuCalBtn');
    if (panel && btn && !panel.contains(e.target) && !btn.contains(e.target)) {
      _open = false;
      panel.style.display = 'none';
    }
  });

  // ── Load customer data ──────────────────────────────────────
  function _loadData() {
    if (typeof firebase === 'undefined') return;
    var user = firebase.auth().currentUser;
    if (!user) return;

    var db    = firebase.firestore();
    var today = new Date(); today.setHours(0,0,0,0);
    var events = {};
    var urgentCount = 0;

    // 1. Customer's own bookings
    db.collection('service_bookings')
      .where('customerId', '==', user.uid)
      .get()
      .then(function(snap) {
        snap.forEach(function(doc) {
          var d    = doc.data();
          var date = d.preferredDate || '';
          if (!date) return;
          var due  = new Date(date + 'T00:00:00');
          var days = Math.round((due - today) / 86400000);
          if (!events[date]) events[date] = [];
          events[date].push({
            type: 'booking',
            label: d.plate || '—',
            services: (d.services || []).join(', '),
            status: d.status || 'Pending',
            time: d.preferredTime || '',
            daysUntil: days,
            urgency: 'booking',
          });
          if (days >= 0 && days <= 7 && (d.status||'').toLowerCase() === 'approved') urgentCount++;
        });

        // 2. Customer's vehicle PMS due dates
        var stored   = sessionStorage.getItem('cpUser');
        var cpUser   = stored ? JSON.parse(stored) : {};
        var userName = (cpUser.name || '').toLowerCase();

        var loadVehicles = userName
          ? Promise.resolve(userName)
          : db.collection('users').doc(user.uid).get().then(function(uDoc) {
              return uDoc.exists ? (uDoc.data().name || '').toLowerCase() : '';
            });

        return loadVehicles.then(function(uName) {
          if (!uName) return;
          return db.collection('vehicles').get().then(function(vSnap) {
            vSnap.forEach(function(doc) {
              var d     = doc.data();
              var owner = (d.owner || '').toLowerCase();
              if (owner !== uName) return;
              var plate = d.plate || '';
              var freq  = parseInt(d.svcFreq) || 0;
              var last  = d.lastSvcDate || '';
              if (!plate || !freq || !last) return;
              var lastDate = new Date(last + 'T00:00:00');
              if (isNaN(lastDate)) return;
              var next = new Date(lastDate);
              next.setMonth(next.getMonth() + freq);
              next.setHours(0,0,0,0);
              var days = Math.round((next - today) / 86400000);
              var key  = next.getFullYear() + '-'
                + String(next.getMonth()+1).padStart(2,'0') + '-'
                + String(next.getDate()).padStart(2,'0');
              var urgency = days < 0 ? 'overdue' : days <= 7 ? 'week' : 'upcoming';
              if (urgency !== 'upcoming') urgentCount++;
              if (!events[key]) events[key] = [];
              events[key].push({ type:'pms', label:plate, daysUntil:days, urgency:urgency });
            });
          });
        });
      })
      .then(function() {
        _events = events;
        _loaded = true;
        var dot = document.getElementById('cuCalDot');
        if (dot) dot.style.display = urgentCount > 0 ? 'block' : 'none';
        _renderGrid();
      })
      .catch(function() { _renderGrid(); });
  }

  // ── Render grid ─────────────────────────────────────────────
  function _renderGrid() {
    var monthEl = document.getElementById('cuCalMonthLabel');
    var yearEl  = document.getElementById('cuCalYearBadge');
    var gridEl  = document.getElementById('cuCalGrid');
    if (!gridEl) return;
    if (monthEl) monthEl.textContent = CAL_MONTHS[_calMonth];
    if (yearEl)  yearEl.textContent  = _calYear;

    var today = new Date(); today.setHours(0,0,0,0);
    var todayKey = today.getFullYear() + '-'
      + String(today.getMonth()+1).padStart(2,'0') + '-'
      + String(today.getDate()).padStart(2,'0');

    var firstDay    = new Date(_calYear, _calMonth, 1).getDay();
    var daysInMonth = new Date(_calYear, _calMonth+1, 0).getDate();
    var prevDays    = new Date(_calYear, _calMonth, 0).getDate();

    var html = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">';
    DOW.forEach(function(d) {
      html += '<div style="text-align:center;font-size:0.6rem;font-weight:700;color:#a0aec0;'
            + 'text-transform:uppercase;padding:2px 0 5px;letter-spacing:0.3px;">' + d + '</div>';
    });

    // Prev month fillers
    for (var i = firstDay - 1; i >= 0; i--) {
      html += '<div class="cu-cal-day other-month"><div class="cu-cal-day-num">' + (prevDays-i) + '</div></div>';
    }

    // Current month
    for (var d = 1; d <= daysInMonth; d++) {
      var key     = _calYear + '-' + String(_calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var dateObj = new Date(_calYear, _calMonth, d); dateObj.setHours(0,0,0,0);
      var evts    = _events[key] || [];
      var isPast  = dateObj < today;
      var isToday = key === todayKey;
      var isSel   = key === _selDay;

      var cls = 'cu-cal-day';
      if (isPast && !isToday) cls += ' past-cell';
      if (isToday) cls += ' today-cell';
      if (evts.length) cls += ' has-evt';
      if (isSel) cls += ' selected';

      var onclick = evts.length ? ' onclick="cuCalSelectDay(\'' + key + '\',event)"' : '';
      html += '<div class="' + cls + '"' + onclick + '>';
      html += '<div class="cu-cal-day-num">' + d + '</div>';
      if (evts.length) {
        html += '<div class="cu-cal-dots">';
        evts.slice(0,6).forEach(function(e) {
          html += '<div class="cu-cal-dot" style="background:' + _urgencyColor(e.urgency) + ';"></div>';
        });
        if (evts.length > 6) html += '<div style="font-size:9px;color:#718096;line-height:7px;">+' + (evts.length-6) + '</div>';
        html += '</div>';
      }
      html += '</div>';
    }

    // Trailing fillers
    var total    = firstDay + daysInMonth;
    var trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (var t = 1; t <= trailing; t++) {
      html += '<div class="cu-cal-day other-month"><div class="cu-cal-day-num">' + t + '</div></div>';
    }
    html += '</div>';
    gridEl.innerHTML = html;

    if (_selDay) _renderDayDetail(_selDay);
  }

  // ── Day detail ───────────────────────────────────────────────
  function _renderDayDetail(key) {
    var evts   = _events[key] || [];
    var detail = document.getElementById('cuCalDayDetail');
    var title  = document.getElementById('cuCalDayTitle');
    var list   = document.getElementById('cuCalDayList');
    if (!detail) return;
    if (!evts.length) { detail.style.display = 'none'; return; }

    var parts = key.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    if (title) title.textContent = CAL_MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

    if (list) {
      list.innerHTML = evts.map(function(e) {
        var color   = _urgencyColor(e.urgency);
        var isBook  = e.type === 'booking';
        var lbl     = isBook
          ? (e.daysUntil < 0 ? 'Past' : e.daysUntil === 0 ? 'Today' : 'In ' + e.daysUntil + 'd')
          : (e.daysUntil < 0
              ? Math.abs(e.daysUntil) + 'd overdue'
              : e.daysUntil === 0 ? 'Due today'
              : 'Due in ' + e.daysUntil + 'd');
        var sub = isBook && e.services ? e.services : isBook && e.time ? e.time : isBook ? '' : 'PMS Due';
        return '<div class="cu-detail-row">'
          + '<div style="width:10px;height:10px;border-radius:3px;background:' + color + ';flex-shrink:0;"></div>'
          + '<div style="flex:1;min-width:0;">'
          + '<strong style="font-size:0.85rem;color:#1a202c;">' + _esc(e.label) + '</strong>'
          + (sub ? '<div style="font-size:0.75rem;color:#718096;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + _esc(sub) + '</div>' : '')
          + '</div>'
          + '<span style="font-size:0.75rem;font-weight:700;color:' + color + ';background:' + color
          + '18;padding:3px 10px;border-radius:20px;flex-shrink:0;">' + lbl + '</span>'
          + '</div>';
      }).join('');
    }
    detail.style.display = 'block';
  }

  // ── Public API ───────────────────────────────────────────────
  window.cuCalNav = function(dir) {
    _calMonth += dir;
    if (_calMonth > 11) { _calMonth = 0; _calYear++; }
    if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
    _selDay = null;
    var detail = document.getElementById('cuCalDayDetail');
    if (detail) detail.style.display = 'none';
    _renderGrid();
  };

  window.cuCalSelectDay = function(key, event) {
    if (event) event.stopPropagation();
    _selDay = _selDay === key ? null : key;
    _renderGrid();
    if (_selDay) _renderDayDetail(_selDay);
    else {
      var detail = document.getElementById('cuCalDayDetail');
      if (detail) detail.style.display = 'none';
    }
  };

  function _esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Init after auth is ready
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof firebase !== 'undefined') {
      firebase.auth().onAuthStateChanged(function(user) {
        if (user) _loadData();
      });
    }
  });
})();
</script>
